<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Digital Portal - Notices</title>
    <!-- Tailwind CSS (Latest Play CDN) & FontAwesome Icons -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Libraries v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Custom neon pulse & modern scrollbar config */
        .cyber-glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15), 0 0 40px rgba(168, 85, 247, 0.1);
        }
        .card-glow:hover {
            box-shadow: 0 0 25px rgba(245, 158, 11, 0.2);
            border-color: rgba(245, 158, 11, 0.4);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #090d16;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
    </style>
</head>
<body class="bg-[#090d16] text-slate-200 font-sans min-h-screen flex flex-col justify-between selection:bg-amber-500 selection:text-slate-950 antialiased">

    <!-- 🌌 BACKGROUND EFFECTS -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute -top-[40%] -left-[20%] w-[80vw] h-[80vw] bg-indigo-500/10 rounded-full blur-[120px]"></div>
        <div class="absolute -bottom-[20%] -right-[10%] w-[60vw] h-[60vw] bg-purple-500/10 rounded-full blur-[100px]"></div>
    </div>

    <!-- 🚀 ULTRA-MODERN HIGH-TECH HEADER -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-[#090d16]/80 border-b border-slate-800/80 cyber-glow">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            
            <!-- Logo Left + Brand Info -->
            <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-start">
                <img id="logo-left" src="" alt="Logo Left" class="hidden h-12 w-12 md:h-14 md:w-14 object-contain rounded-xl bg-slate-900 border border-slate-700/50 p-1.5 shadow-inner">
                
                <div class="flex flex-col">
                    <h1 id="site-title" class="text-xl md:text-2xl font-black uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-cube text-amber-500 animate-[pulse_2s_infinite] text-lg md:text-xl"></i>
                        <span class="text-white">Arif</span> 
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-amber-500 to-orange-500 font-extrabold">Online Center</span>
                    </h1>
                    <p id="site-address" class="text-[10px] md:text-xs font-medium text-slate-400 mt-0.5 tracking-wide flex items-center gap-1">
                        <!-- Loaded dynamically via database -->
                    </p>
                </div>
            </div>

            <!-- Right Segment: Live Status Badge + Right Logo -->
            <div class="flex items-center gap-4 w-full md:w-auto justify-end border-t border-slate-800 md:border-t-0 pt-3 md:pt-0">
                <div class="flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/30 px-3 py-1.5 rounded-full">
                    <span class="h-2 w-2 rounded-full bg-emerald-500 animate-ping"></span>
                    <span class="text-[10px] uppercase tracking-widest font-bold text-emerald-400">Portal Operational</span>
                </div>
                <img id="logo-right" src="" alt="Logo Right" class="hidden h-12 w-12 md:h-14 md:w-14 object-contain rounded-xl bg-slate-900 border border-slate-700/50 p-1.5 shadow-inner">
            </div>

        </div>
    </header>

    <!-- 📢 MAIN HUB: NOTICES CONTAINER -->
    <main class="max-w-5xl w-full mx-auto px-4 py-10 flex-grow relative z-10">
        
        <!-- Live Alert Dynamic Marquee -->
        <div class="flex items-center gap-3 mb-8 bg-slate-900/60 border border-slate-800 p-2.5 rounded-xl backdrop-blur-xs">
            <span class="bg-amber-500 text-slate-950 text-[10px] font-black uppercase tracking-wider px-2 py-1 rounded-md shrink-0 shadow-md">Notice</span>
            <span class="text-xs font-semibold text-slate-300 tracking-wide truncate">All server links and application protocols are running smoothly. Check listings below.</span>
        </div>

        <!-- Cards Target Area -->
        <div id="public-notices-container" class="space-y-6">
            <!-- Loading Indicator -->
            <div class="text-center py-24 text-slate-500">
                <div class="inline-block relative w-10 h-10 mb-3">
                    <div class="absolute inset-0 border-4 border-slate-800 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
                <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Initializing Core Feed...</p>
            </div>
        </div>
    </main>

    <!-- 📞 TELEPORT/WHATSAPP FLOATING HUB -->
    <a id="floating-whatsapp" href="#" target="_blank" class="hidden fixed bottom-6 right-6 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white p-4 rounded-2xl shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all duration-300 transform hover:scale-110 items-center justify-center z-50 group border border-emerald-400/20">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
        <span class="absolute right-16 bg-slate-900 border border-slate-800 text-white text-[11px] font-bold px-3 py-2 rounded-xl whitespace-nowrap opacity-0 group-hover:opacity-100 transition-all duration-200 transform translate-x-2 group-hover:translate-x-0 shadow-2xl">Connect Directly</span>
    </a>

    <!-- 🏢 BOTTOM SYSTEM FOOTER -->
    <footer class="bg-[#05070c] border-t border-slate-900 text-slate-500 text-center py-8 relative z-10">
        <div class="max-w-5xl mx-auto px-4 space-y-3">
            <p id="site-slogan" class="text-amber-500/80 font-bold text-xs uppercase tracking-widest">
                <!-- Loaded dynamically -->
            </p>
            <div class="h-px bg-gradient-to-r from-transparent via-slate-800 to-transparent w-1/2 mx-auto"></div>
            <p class="text-[10px] font-mono tracking-wider">&copy; 2026 ARIF ONLINE CENTER // AUTOMATION LAYER v2.1</p>
        </div>
    </footer>

    <!-- 🌐 DATABASE CORE BRIDGE -->
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB0w82POMs3HZ6Ay-3Z4g0nhLPGHNQCNlY",
            authDomain: "arif-online-3f79e.firebaseapp.com",
            databaseURL: "https://arif-online-3f79e-default-rtdb.firebaseio.com",
            projectId: "arif-online-3f79e",
            storageBucket: "arif-online-3f79e.firebasestorage.app",
            messagingSenderId: "535907035651",
            appId: "1:535907035651:web:630f5780842de82d2e7c36"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let globalPhone = "9504291254"; 

        // 1. CONFIG SUBSCRIPTION
        database.ref('config').on('value', (snapshot) => {
            const config = snapshot.val() || {};
            if(config.phone) globalPhone = config.phone;

            const titleEl = document.getElementById('site-title');
            const addressEl = document.getElementById('site-address');
            const sloganEl = document.getElementById('site-slogan');
            const whatsappBtn = document.getElementById('floating-whatsapp');
            const leftLogoImg = document.getElementById('logo-left');
            const rightLogoImg = document.getElementById('logo-right');

            // Set Brand Title Grid layout
            titleEl.innerHTML = `
                <i class="fa-solid fa-cube text-amber-500 animate-[pulse_2s_infinite] text-base md:text-xl"></i>
                <span class="text-white">${config.shopName ? config.shopName.split(' ')[0] : 'Arif'}</span> 
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-amber-500 to-orange-500 font-black tracking-wide">${config.shopName ? config.shopName.split(' ').slice(1).join(' ') : 'Online Center'}</span>
            `;
            
            addressEl.innerHTML = `<i class="fa-solid fa-location-dot text-amber-500 text-[10px]"></i> ${config.address || 'MOMIN TOLA SAHEBGANJ MASJID ROAD, BHAGALPUR'}`;
            sloganEl.innerText = config.slogan || "⚡ ARIF ONLINE CENTER - SERVICE AUTOMATION PORTAL ⚡";

            // State Visibility Controls
            document.querySelector('header').style.display = (config.showName !== false || config.showAddress !== false) ? 'block' : 'none';
            addressEl.style.display = (config.showAddress !== false) ? 'flex' : 'none';
            sloganEl.style.display = (config.showSlogan !== false) ? 'block' : 'none';

            // Left Logo Setup
            if(config.showLogoLeft !== false && config.logoLeft) {
                leftLogoImg.src = config.logoLeft;
                leftLogoImg.classList.remove('hidden');
            } else {
                leftLogoImg.classList.add('hidden');
            }

            // Right Logo Setup
            if(config.showLogoRight !== false && config.logoRight) {
                rightLogoImg.src = config.logoRight;
                rightLogoImg.classList.remove('hidden');
            } else {
                rightLogoImg.classList.add('hidden');
            }

            // Floating Node Control
            if (config.showPhone !== false && config.phone) {
                whatsappBtn.href = `https://api.whatsapp.com/send?phone=91${config.phone}&text=Hello! I visited your online portal and need assistance.`;
                whatsappBtn.classList.replace('hidden', 'flex');
            } else {
                whatsappBtn.classList.replace('flex', 'hidden');
            }
        });

        // 2. LIVE DATA STREAM LOGIC (NOTICES)
        database.ref('notices').on('value', (snapshot) => {
            const container = document.getElementById('public-notices-container');
            container.innerHTML = ""; 

            const data = snapshot.val();
            
            if (!data) {
                container.innerHTML = `
                    <div class="bg-slate-900/40 border border-slate-800 p-12 rounded-2xl text-center text-slate-500 max-w-md mx-auto shadow-xl">
                        <div class="text-slate-700 text-4xl mb-3"><i class="fa-solid fa-terminal"></i></div>
                        <p class="font-mono text-xs tracking-wider uppercase">Console: No active entries broadcasted.</p>
                    </div>`;
                return;
            }

            const noticesList = [];
            Object.keys(data).forEach(key => {
                noticesList.push(data[key]);
            });
            noticesList.reverse();

            noticesList.forEach((item) => {
                const noticeCard = document.createElement('article');
                noticeCard.className = "bg-slate-900/30 backdrop-blur-md rounded-2xl border border-slate-800/80 overflow-hidden card-glow transition-all duration-300 grid grid-cols-1 md:grid-cols-5 group";

                let imgHTML = "";
                let detailsColSpan = "md:col-span-5";

                if (item.image) {
                    detailsColSpan = "md:col-span-3"; 
                    imgHTML = `
                        <div class="md:col-span-2 bg-[#05070c]/50 border-b md:border-b-0 md:border-r border-slate-800/60 flex justify-center items-center p-3 min-h-[220px]">
                            <img src="${item.image}" alt="Notice Asset" class="w-full h-full max-h-[300px] object-contain rounded-xl group-hover:scale-[1.01] transition duration-300" loading="lazy">
                        </div>`;
                }

                const whatsappText = encodeURIComponent(`Hello Arif Bhai, mujhe iske baare me janna hai:\n📌 *${item.title}*`);
                const whatsappUrl = `https://api.whatsapp.com/send?phone=91${globalPhone}&text=${whatsappText}`;
                const shareTitle = item.title;

                noticeCard.innerHTML = `
                    ${imgHTML}
                    <div class="${detailsColSpan} p-6 flex flex-col justify-between space-y-5">
                        <div class="space-y-3">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                                <h2 class="text-base md:text-xl font-bold text-white tracking-wide group-hover:text-amber-400 transition duration-150 leading-snug">${item.title}</h2>
                            </div>
                            <p class="text-[10px] font-mono font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1.5">
                                <i class="fa-solid fa-calendar-day text-slate-600"></i> ${item.date}
                            </p>
                            <div class="h-px bg-slate-800/60 w-full"></div>
                            <p class="text-xs md:text-sm text-slate-400 whitespace-pre-wrap font-medium leading-relaxed font-sans">${item.desc}</p>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 pt-2">
                            <a href="${whatsappUrl}" target="_blank" class="flex items-center justify-center gap-2 bg-slate-800/80 hover:bg-emerald-600 text-slate-300 hover:text-white text-xs md:text-sm font-bold py-3 px-4 rounded-xl border border-slate-700/60 hover:border-emerald-500 transition duration-200 shadow-lg">
                                <i class="fa-brands fa-whatsapp text-sm md:text-base"></i> Process Order
                            </a>
                            <button onclick="sharePost('${escape(shareTitle)}')" class="flex items-center justify-center gap-2 bg-slate-900/50 hover:bg-slate-800 text-slate-400 hover:text-slate-200 text-xs md:text-sm font-bold py-3 px-4 rounded-xl border border-slate-800 transition duration-150 cursor-pointer">
                                <i class="fa-solid fa-share-nodes text-blue-500"></i> Share Node
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(noticeCard);
            });
        });

        // TELEMETRY/SHARE DISPATCHER
        function sharePost(escapedTitle) {
            const title = unescape(escapedTitle);
            const currentUrl = window.location.href;
            const fullShareText = `📢 *${title}*\n\nNeeche diye gaye link par click karke poori jankari dekhein:\n🔗 ${currentUrl}`;

            if (navigator.share) {
                navigator.share({
                    title: title,
                    text: fullShareText,
                    url: currentUrl
                }).catch(err => console.log(err));
            } else {
                navigator.clipboard.writeText(fullShareText)
                .then(() => alert("🚀 System: Share link synced and copied to clipboard!"))
                .catch(() => alert("Clipboard transmission failed."));
            }
        }
    </script>
</body>
</html>
