<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Digital Portal - Notices</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        .premium-bg { background-color: #f8fafc; background-image: radial-gradient(#e2e8f0 1.1px, transparent 1.1px), radial-gradient(#e2e8f0 1.1px, #f8fafc 1.1px); background-size: 24px 24px; background-position: 0 0, 12px 12px; }
        .card-shadow-smooth { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 4px 12px -2px rgba(0, 0, 0, 0.03); }
        .card-shadow-smooth:hover { box-shadow: 0 20px 40px -5px rgba(245, 158, 11, 0.1), 0 8px 20px -4px rgba(0, 0, 0, 0.04); border-color: rgba(245, 158, 11, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="premium-bg text-slate-800 font-sans min-h-screen">

    <header class="sticky top-0 z-50 backdrop-blur-md bg-white/90 border-b border-slate-200 shadow-xs w-full">
        <div class="w-full py-4 px-3 md:px-6">
            <div class="flex flex-row items-center justify-between gap-6 max-w-7xl mx-auto w-full">
                <img id="logo-left" src="" class="hidden h-16 w-16 object-contain rounded-2xl bg-slate-50 border border-slate-200 p-1">
                <div class="flex flex-col items-center text-center flex-grow">
                    <h1 id="site-title" class="text-2xl md:text-3xl font-black uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-shapes text-amber-500"></i> Arif Online Center
                    </h1>
                    <p id="site-address" class="text-xs font-semibold text-slate-500 mt-1"></p>
                </div>
                <img id="logo-right" src="" class="hidden h-16 w-16 object-contain rounded-2xl bg-slate-50 border border-slate-200 p-1">
            </div>
        </div>
    </header>

    <main class="max-w-4xl w-full mx-auto px-4 py-10">
        <div class="flex items-center gap-3 mb-8 bg-white border border-slate-200 p-3 rounded-2xl shadow-xs">
            <span class="bg-slate-900 text-white text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded-md">Live Update</span>
            <span id="live-banner-text" class="text-xs font-medium text-slate-600">Welcome to our official public dashboard.</span>
        </div>
        <div id="public-notices-container" class="space-y-6"></div>
    </main>

    <div id="details-modal" class="fixed inset-0 z-50 hidden bg-slate-950/60 backdrop-blur-md items-center justify-center p-4">
        <div id="modal-card" class="bg-white w-full max-w-2xl rounded-3xl border shadow-2xl transition-all scale-95 opacity-0">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <span class="bg-amber-500 text-[10px] font-black px-3 py-1 rounded-md uppercase">Notice Info</span>
                <button onclick="closeModal()" class="h-8 w-8 rounded-full bg-slate-200 hover:bg-red-500"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-8">
                <img id="modal-image" src="" class="w-full max-h-[300px] object-contain rounded-xl mb-4 hidden">
                <h2 id="modal-title" class="text-3xl font-extrabold mb-4"></h2>
                <p id="modal-desc" class="text-slate-600 leading-relaxed"></p>
            </div>
            <div id="modal-actions" class="p-6 border-t bg-slate-50 flex gap-3"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* Apna config wahi rakhein */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let globalPhone = "9504291254";

        function openModal(title, desc, imageUrl) {
            const modal = document.getElementById('details-modal');
            const card = document.getElementById('modal-card');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            const img = document.getElementById('modal-image');
            if(imageUrl) { img.src = imageUrl; img.classList.remove('hidden'); } else { img.classList.add('hidden'); }
            
            document.getElementById('modal-actions').innerHTML = `
                <a href="https://api.whatsapp.com/send?phone=91${globalPhone}&text=${encodeURIComponent('Hello: ' + title)}" class="flex-1 bg-emerald-600 text-white font-bold py-3 text-center rounded-xl">Process Order</a>
                <button onclick="sharePost('${title.replace(/'/g, "\\'")}', '${(imageUrl||'').replace(/'/g, "\\'")}')" class="flex-1 bg-slate-100 font-bold py-3 rounded-xl">Share Post</button>
            `;
            modal.classList.replace('hidden', 'flex');
            setTimeout(() => { card.classList.replace('scale-95', 'scale-100'); card.classList.replace('opacity-0', 'opacity-100'); }, 50);
        }

        function closeModal() {
            const card = document.getElementById('modal-card');
            card.classList.replace('scale-100', 'scale-95');
            card.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => { document.getElementById('details-modal').classList.replace('flex', 'hidden'); }, 200);
        }

        async function sharePost(title, imageUrl) {
            const text = `📢 *${title}*\n\nCheck here: ${window.location.href}`;
            if (navigator.share && imageUrl) {
                const blob = await (await fetch(imageUrl)).blob();
                await navigator.share({ title: title, text: text, files: [new File([blob], "notice.jpg", { type: blob.type })] });
            } else { navigator.clipboard.writeText(text); alert("Link copied!"); }
        }

        database.ref('notices').on('value', (snapshot) => {
            const container = document.getElementById('public-notices-container');
            container.innerHTML = "";
            const data = snapshot.val();
            if(!data) return;
            Object.values(data).reverse().forEach((item) => {
                const art = document.createElement('article');
                art.className = "bg-white rounded-2xl border p-6 card-shadow-smooth flex flex-col md:flex-row gap-6";
                art.innerHTML = `
                    ${item.image ? `<img src="${item.image}" class="w-full md:w-2/5 h-64 object-cover rounded-xl cursor-pointer" onclick="openModal('${item.title.replace(/'/g, "\\'")}', '${item.desc.replace(/'/g, "\\'")}', '${item.image}')">` : ""}
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <h2 class="text-2xl font-black text-slate-900 mb-3">${item.title}</h2>
                            <p class="text-sm text-slate-600 leading-relaxed">${item.desc}</p>
                        </div>
                        <div class="flex gap-3 pt-4">
                            <a href="https://api.whatsapp.com/send?phone=91${globalPhone}&text=${encodeURIComponent(item.title)}" target="_blank" class="flex-1 bg-emerald-600 text-white font-bold py-3 text-center rounded-xl">Process Order</a>
                            <button onclick="sharePost('${item.title.replace(/'/g, "\\'")}', '${(item.image||'').replace(/'/g, "\\'")}')" class="flex-1 bg-slate-50 font-bold py-3 rounded-xl border">Share Post</button>
                        </div>
                    </div>
                `;
                container.appendChild(art);
            });
        });
    </script>
</body>
</html>
