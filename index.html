<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Digital Portal - Notices</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        .premium-bg { background-color: #f8fafc; background-image: radial-gradient(#e2e8f0 1.1px, transparent 1.1px), radial-gradient(#e2e8f0 1.1px, #f8fafc 1.1px); background-size: 24px 24px; background-position: 0 0, 12px 12px; }
        .card-shadow-smooth { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="premium-bg text-slate-800 font-sans min-h-screen flex flex-col antialiased">

    <header class="sticky top-0 z-50 backdrop-blur-md bg-white/90 border-b border-slate-200 shadow-xs w-full">
        <div class="max-w-7xl mx-auto py-4 px-4 flex items-center justify-between">
            <img id="logo-left" src="" class="hidden h-12 w-12 object-contain rounded-xl">
            <div class="text-center flex-grow">
                <h1 id="site-title" class="text-xl font-black uppercase tracking-wider">Arif Online Center</h1>
                <p id="site-address" class="text-[10px] text-slate-500 font-semibold uppercase tracking-wide"></p>
            </div>
            <img id="logo-right" src="" class="hidden h-12 w-12 object-contain rounded-xl">
        </div>
    </header>

    <main class="max-w-3xl w-full mx-auto px-4 py-6 flex-grow">
        <div class="mb-6 bg-white border border-slate-200 p-3 rounded-2xl shadow-xs flex items-center gap-3">
            <span class="bg-slate-900 text-white text-[10px] font-bold px-2 py-1 rounded-md uppercase">Live Update</span>
            <span id="live-banner-text" class="text-xs text-slate-600 font-medium truncate">Welcome to our official public dashboard.</span>
        </div>

        <div id="public-notices-container" class="space-y-4">
            <div class="text-center py-20 text-slate-400">Loading notices...</div>
        </div>
    </main>

    <div id="details-modal" class="fixed inset-0 z-50 hidden bg-slate-950/60 backdrop-blur-md p-4 items-center justify-center">
        <div id="modal-card" class="bg-white w-full max-w-lg rounded-3xl p-6 shadow-2xl transition-all scale-95 opacity-0">
            <button onclick="closeModal()" class="float-right text-slate-400 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
            <img id="modal-image" src="" class="w-full max-h-60 object-contain rounded-xl mb-4 hidden">
            <h2 id="modal-title" class="text-xl font-bold mb-2"></h2>
            <p id="modal-desc" class="text-sm text-slate-600 mb-6"></p>
            <a id="modal-whatsapp" href="#" target="_blank" class="block w-full text-center bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700">Process Order</a>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB0w82POMs3HZ6Ay-3Z4g0nhLPGHNQCNlY", authDomain: "arif-online-3f79e.firebaseapp.com", databaseURL: "https://arif-online-3f79e-default-rtdb.firebaseio.com", projectId: "arif-online-3f79e", storageBucket: "arif-online-3f79e.firebasestorage.app", messagingSenderId: "535907035651", appId: "1:535907035651:web:630f5780842de82d2e7c36" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let globalPhone = "9504291254";

        function openModal(title, desc, image) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            const img = document.getElementById('modal-image');
            if(image) { img.src = image; img.classList.remove('hidden'); } else { img.classList.add('hidden'); }
            document.getElementById('modal-whatsapp').href = `https://api.whatsapp.com/send?phone=91${globalPhone}&text=Hello! I need info about: ${title}`;
            document.getElementById('details-modal').classList.replace('hidden', 'flex');
            setTimeout(() => { document.getElementById('modal-card').classList.replace('scale-95', 'scale-100'); document.getElementById('modal-card').classList.replace('opacity-0', 'opacity-100'); }, 10);
        }

        function closeModal() {
            const card = document.getElementById('modal-card');
            card.classList.replace('scale-100', 'scale-95');
            card.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => document.getElementById('details-modal').classList.add('hidden'), 200);
        }

        // Notices Load with Thumbnail Logic
        database.ref('notices').on('value', (snapshot) => {
            const container = document.getElementById('public-notices-container');
            container.innerHTML = "";
            const data = snapshot.val();
            if(!data) { container.innerHTML = `<p class="text-center text-slate-400">No active notices available.</p>`; return; }
            
            Object.values(data).reverse().forEach(item => {
                const article = document.createElement('article');
                article.className = "bg-white border border-slate-200 p-4 rounded-2xl shadow-xs flex items-center gap-4 cursor-pointer hover:border-amber-500 transition-all";
                article.onclick = () => openModal(item.title, item.desc, item.image);
                
                // Thumbnail Image Logic
                const thumb = item.image ? `<img src="${item.image}" class="w-16 h-16 object-cover rounded-xl border border-slate-100 shadow-sm">` : `<div class="w-16 h-16 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400"><i class="fa-solid fa-bell"></i></div>`;
                
                article.innerHTML = `${thumb} <div class="flex-grow min-w-0"><h2 class="font-bold text-sm md:text-base truncate text-slate-900">${item.title}</h2><p class="text-[11px] md:text-xs text-slate-500 line-clamp-2 mt-0.5">${item.desc}</p></div><i class="fa-solid fa-chevron-right text-slate-300 ml-auto"></i>`;
                container.appendChild(article);
            });
        });
    </script>
</body>
</html>
