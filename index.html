<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Digital Portal - Notices & Services</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Smooth subtle grid pattern background for clean premium aesthetic */
        .premium-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1.1px, transparent 1.1px), radial-gradient(#e2e8f0 1.1px, #f8fafc 1.1px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
        }
        .card-shadow-smooth {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 4px 12px -2px rgba(0, 0, 0, 0.03);
        }
        .card-shadow-smooth:hover {
            box-shadow: 0 20px 40px -5px rgba(245, 158, 11, 0.1), 0 8px 20px -4px rgba(0, 0, 0, 0.04);
            border-color: rgba(245, 158, 11, 0.3);
        }
        /* Custom hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="premium-bg text-slate-800 font-sans min-h-screen flex flex-col justify-between selection:bg-amber-500 selection:text-slate-900 antialiased">

    <header class="sticky top-0 z-50 backdrop-blur-md bg-white/90 border-b border-slate-200 shadow-xs w-full">
        <div class="w-full py-4 px-3 md:px-6">
            
            <div class="flex flex-row items-center justify-between gap-2 md:gap-6 max-w-7xl mx-auto w-full">
                
                <div class="flex items-center justify-start shrink-0">
                    <img id="logo-left" src="" alt="Logo Left" class="hidden h-11 w-11 sm:h-14 sm:w-14 md:h-16 md:w-16 object-contain rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 p-0.5 sm:p-1 shadow-xs">
                </div>
                
                <div class="flex flex-col items-center text-center flex-grow px-1">
                    <h1 id="site-title" class="text-sm sm:text-2xl md:text-3xl font-black uppercase tracking-wider flex items-center justify-center gap-1 sm:gap-2">
                        <i class="fa-solid fa-shapes text-amber-500 text-xs sm:text-lg md:text-2xl"></i>
                        <span class="text-slate-900">Arif</span> 
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-500 via-amber-600 to-orange-600 font-black tracking-wide">Online Center</span>
                    </h1>
                    <p id="site-address" class="text-[8px] sm:text-[10px] md:text-xs font-semibold text-slate-500 mt-0.5 sm:mt-1 tracking-wide flex items-center justify-center gap-1">
                    </p>
                </div>

                <div class="flex items-center justify-end shrink-0">
                    <img id="logo-right" src="" alt="Logo Right" class="hidden h-11 w-11 sm:h-14 sm:w-14 md:h-16 md:w-16 object-contain rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 p-0.5 sm:p-1 shadow-xs">
                </div>

            </div>

        </div>
    </header>

    <section id="social-channels-bar" class="bg-slate-900 text-white border-b-4 border-amber-500 py-2.5 px-4 shadow-md sticky top-[69px] md:top-[85px] z-40 hidden">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3 text-center sm:text-left">
            <div class="flex items-center gap-2">
                <span class="h-1.5 w-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                <p id="top-bar-slogan" class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-slate-300">
                    ⚡ WELCOME TO OUR OFFICIAL PORTAL ⚡
                </p>
            </div>
            
            <div class="flex items-center gap-2.5">
                <a id="lnk-youtube" href="#" target="_blank" class="hidden bg-red-600 hover:bg-red-700 text-white text-[10px] font-black px-3 py-1.5 rounded-lg shadow-xs transition duration-200 flex items-center gap-1.5 uppercase tracking-wider">
                    <i class="fa-brands fa-youtube text-xs"></i> YouTube
                </a>
                <a id="lnk-wagroup" href="#" target="_blank" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] font-black px-3 py-1.5 rounded-lg shadow-xs transition duration-200 flex items-center gap-1.5 uppercase tracking-wider">
                    <i class="fa-brands fa-whatsapp text-xs"></i> Join Group
                </a>
            </div>
        </div>
    </section>

    <div class="w-full bg-white border-b border-slate-200 sticky top-[115px] md:top-[133px] z-30 shadow-xs">
        <div class="max-w-md mx-auto flex p-1.5 gap-2">
            <button id="btn-tab-notices" onclick="switchTab('notices')" class="flex-1 py-2.5 px-4 rounded-xl text-xs md:text-sm font-bold tracking-wider uppercase transition-all duration-200 cursor-pointer flex items-center justify-center gap-2 bg-slate-900 text-white shadow-xs">
                <i class="fa-regular fa-bell"></i> Public Notices
            </button>
            <button id="btn-tab-services" onclick="switchTab('services')" class="flex-1 py-2.5 px-4 rounded-xl text-xs md:text-sm font-bold tracking-wider uppercase transition-all duration-200 cursor-pointer flex items-center justify-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200">
                <i class="fa-solid fa-gears"></i> Our Services
            </button>
        </div>
    </div>

    <main class="max-w-4xl w-full mx-auto px-4 py-6 md:py-10 flex-grow relative z-10">
        
        <div class="flex items-center gap-3 mb-6 md:mb-8 bg-white border border-slate-200 p-3 rounded-2xl shadow-xs">
            <span class="bg-slate-900 text-white text-[9px] md:text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded-md shrink-0">Live Update</span>
            <span id="live-banner-text" class="text-xs font-medium text-slate-600 tracking-wide truncate">Welcome to our official public dashboard. Select any notice to proceed.</span>
        </div>

        <div id="public-notices-container" class="space-y-4 md:space-y-6 tab-content-view">
            <div class="text-center py-24 text-slate-400">
                <div class="inline-block relative w-10 h-10 mb-2">
                    <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
                <p class="text-xs font-bold uppercase tracking-widest text-slate-500">Syncing live server feed...</p>
            </div>
        </div>
        
<div id="public-services-container" class="space-y-4 md:space-y-6 tab-content-view hidden">
            <div class="text-center py-24 text-slate-400">
                <div class="inline-block relative w-10 h-10 mb-2">
                    <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
                <p class="text-xs font-bold uppercase tracking-widest text-slate-500">Loading service catalogs...</p>
            </div>
        </div>
    </main>

    <div id="details-modal" class="fixed inset-0 z-50 hidden bg-slate-950/60 backdrop-blur-md items-center justify-center p-4 transition-all duration-300">
        <div class="bg-white w-full max-w-2xl rounded-3xl border border-slate-200 shadow-2xl overflow-hidden max-h-[85vh] flex flex-col transform scale-95 opacity-0 transition-all duration-300" id="modal-card">
            <div class="p-4 md:p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                <span id="modal-tag" class="bg-amber-500 text-slate-950 text-[10px] font-black uppercase tracking-widest px-2.5 py-1 rounded-md">Details View</span>
                <button onclick="closeModal()" class="h-8 w-8 rounded-full bg-slate-200 hover:bg-red-500 hover:text-white transition-all text-slate-600 flex items-center justify-center cursor-pointer">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="p-5 md:p-8 overflow-y-auto space-y-5 no-scrollbar">
                <div id="modal-img-container" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 flex justify-center items-center hidden">
                    <img id="modal-image" src="" alt="Preview" class="max-h-[300px] object-contain rounded-xl">
                </div>
                <div class="space-y-3">
                    <h2 id="modal-title" class="text-xl md:text-3xl font-extrabold text-slate-900 tracking-tight leading-snug"></h2>
                    <hr class="border-slate-100">
                    <p id="modal-desc" class="text-sm md:text-base text-slate-600 whitespace-pre-wrap leading-relaxed tracking-wide font-sans"></p>
                </div>
            </div>
            <div id="modal-actions" class="p-4 md:p-6 border-t border-slate-100 bg-slate-50 flex flex-row gap-3">
                </div>
        </div>
    </div>

    <a id="floating-whatsapp" href="#" target="_blank" class="hidden fixed bottom-5 right-5 md:bottom-6 md:right-6 bg-emerald-500 hover:bg-emerald-600 text-white p-3.5 md:p-4 rounded-2xl shadow-lg hover:shadow-emerald-500/20 transition-all duration-300 transform hover:scale-105 items-center justify-center z-50 group border border-emerald-400/10">
        <i class="fa-brands fa-whatsapp text-xl md:text-2xl"></i>
        <span class="absolute right-16 bg-slate-950 text-white text-[11px] font-bold px-3 py-2 rounded-xl whitespace-nowrap opacity-0 group-hover:opacity-100 transition-all duration-200 shadow-xl hidden md:inline">Contact Center</span>
    </a>

    <footer class="bg-white border-t border-slate-200 text-slate-500 text-center py-6 md:py-8 relative z-10">
        <div class="max-w-4xl mx-auto px-4">
            <p class="text-[9px] md:text-[10px] font-medium tracking-wider text-slate-400">&copy; 2026 ARIF ONLINE CENTER. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB0w82POMs3HZ6Ay-3Z4g0nhLPGHNQCNlY",
            authDomain: "arif-online-3f79e.firebaseapp.com",
            databaseURL: "https://arif-online-3f79e-default-rtdb.firebaseio.com",
            projectId: "arif-online-3f79e",
            storageBucket: "arif-online-3f79e.firebasestorage.app",
            messagingSenderId: "535907035651",
            appId: "1:535907035651:web:630f5780842de82d2e7c36"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let globalPhone = "9504291254"; 
        let currentTab = "notices";

        // TAB SWITCHER FUNCTION
        function switchTab(tabName) {
            currentTab = tabName;
            const noticesBtn = document.getElementById('btn-tab-notices');
            const servicesBtn = document.getElementById('btn-tab-services');
            const noticesCont = document.getElementById('public-notices-container');
            const servicesCont = document.getElementById('public-services-container');
            const bannerText = document.getElementById('live-banner-text');

            if(tabName === 'notices') {
                noticesBtn.className = "flex-1 py-2.5 px-4 rounded-xl text-xs md:text-sm font-bold tracking-wider uppercase transition-all duration-200 cursor-pointer flex items-center justify-center gap-2 bg-slate-900 text-white shadow-xs";
                servicesBtn.className = "flex-1 py-2.5 px-4 rounded-xl text-xs md:text-sm font-bold tracking-wider uppercase transition-all duration-200 cursor-pointer flex items-center justify-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200";
                noticesCont.classList.remove('hidden');
                servicesCont.classList.add('hidden');
                bannerText.innerText = "Welcome to our official public dashboard. Select any notice to proceed.";
            } else {
                servicesBtn.className = "flex-1 py-2.5 px-4 rounded-xl text-xs md:text-sm font-bold tracking-wider uppercase transition-all duration-200 cursor-pointer flex items-center justify-center gap-2 bg-slate-900 text-white shadow-xs";
                noticesBtn.className = "flex-1 py-2.5 px-4 rounded-xl text-xs md:text-sm font-bold tracking-wider uppercase transition-all duration-200 cursor-pointer flex items-center justify-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200";
                servicesCont.classList.remove('hidden');
                noticesCont.classList.add('hidden');
                bannerText.innerText = "Explore our premium online services. Click on any service for details.";
            }
        }

        // POPUP MODAL FUNCTION LOGIC
        function openModal(title, desc, imageUrl, type) {
            const modal = document.getElementById('details-modal');
            const modalCard = document.getElementById('modal-card');
            const modalTitle = document.getElementById('modal-title');
            const modalDesc = document.getElementById('modal-desc');
            const modalTag = document.getElementById('modal-tag');
            const imgContainer = document.getElementById('modal-img-container');
            const modalImg = document.getElementById('modal-image');
            const modalActions = document.getElementById('modal-actions');

            modalTitle.innerText = title;
            modalDesc.innerText = desc;
            modalTag.innerText = type === 'services' ? 'Service Plan' : 'Notice Info';

            if(imageUrl && imageUrl.trim() !== "") {
                modalImg.src = imageUrl;
                imgContainer.classList.remove('hidden');
            } else {
                imgContainer.classList.add('hidden');
            }

            const whatsappText = encodeURIComponent(`Hello Arif Bhai, mujhe iske baare me janna hai:\n📌 *${title}*`);
            const whatsappUrl = `https://api.whatsapp.com/send?phone=91${globalPhone}&text=${whatsappText}`;
            const safeTitle = title.replace(/'/g, "\\'");
            const safeImage = imageUrl.replace(/'/g, "\\'");

            modalActions.innerHTML = `
                <a href="${whatsappUrl}" target="_blank" class="flex-1 flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs md:text-sm font-bold py-3 px-4 rounded-xl shadow-xs transition duration-200">
                    <i class="fa-brands fa-whatsapp text-sm md:text-base"></i> Process Order
                </a>
                <button onclick="sharePost('${safeTitle}', '${safeImage}')" class="flex-1 flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs md:text-sm font-bold py-3 px-4 rounded-xl border border-slate-200 transition duration-150 cursor-pointer">
                    <i class="fa-solid fa-share-nodes text-blue-500"></i> Share Post
                </button>
            `;

            modal.classList.replace('hidden', 'flex');
            setTimeout(() => {
                modalCard.classList.replace('scale-95', 'scale-100');
                modalCard.classList.replace('opacity-0', 'opacity-100');
            }, 50);
        }

        function closeModal() {
            const modal = document.getElementById('details-modal');
            const modalCard = document.getElementById('modal-card');
            modalCard.classList.replace('scale-100', 'scale-95');
            modalCard.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => {
                modal.classList.replace('flex', 'hidden');
            }, 200);
        }

        // Close modal when clicking outside the container box
        document.getElementById('details-modal').addEventListener('click', function(e) {
            if(e.target === this) closeModal();
        });

        // 1. CONFIG REALTIME LISTENER
        database.ref('config').on('value', (snapshot) => {
            const config = snapshot.val() || {};
            if(config.phone) globalPhone = config.phone;

            const titleEl = document.getElementById('site-title');
            const addressEl = document.getElementById('site-address');
            const topBarSloganEl = document.getElementById('top-bar-slogan');
            const whatsappBtn = document.getElementById('floating-whatsapp');
            const leftLogoImg = document.getElementById('logo-left');
            const rightLogoImg = document.getElementById('logo-right');

            titleEl.innerHTML = `
                <i class="fa-solid fa-shapes text-amber-500 text-xs sm:text-lg md:text-2xl"></i>
                <span class="text-slate-900">${config.shopName ? config.shopName.split(' ')[0] : 'Arif'}</span> 
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-500 via-amber-600 to-orange-600 font-black tracking-wide">${config.shopName ? config.shopName.split(' ').slice(1).join(' ') : 'Online Center'}</span>
            `;
            
            addressEl.innerHTML = `<i class="fa-solid fa-location-dot text-amber-500 text-[9px] sm:text-[11px]"></i> ${config.address || 'MOMIN TOLA SAHEBGANJ MASJID ROAD, BHAGALPUR'}`;
            
            const officialSlogan = config.slogan || "⚡ ARIF ONLINE CENTER - SERVICE AUTOMATION PORTAL ⚡";
            if(topBarSloganEl) topBarSloganEl.innerText = officialSlogan;

            document.querySelector('header').style.display = (config.showName !== false || config.showAddress !== false) ? 'block' : 'none';
            addressEl.style.display = (config.showAddress !== false) ? 'flex' : 'none';

            if(config.showLogoLeft !== false && config.logoLeft) {
                leftLogoImg.src = config.logoLeft;
                leftLogoImg.classList.remove('hidden');
            } else {
                leftLogoImg.classList.add('hidden');
            }

            if(config.showLogoRight !== false && config.logoRight) {
                rightLogoImg.src = config.logoRight;
                rightLogoImg.classList.remove('hidden');
            } else {
                rightLogoImg.classList.add('hidden');
            }

            if (config.showPhone !== false && config.phone) {
                whatsappBtn.href = `https://api.whatsapp.com/send?phone=91${config.phone}&text=Hello! I am visiting your web portal and need assistance.`;
                whatsappBtn.classList.replace('hidden', 'flex');
            } else {
                whatsappBtn.classList.replace('flex', 'hidden');
            }

            let showSocialBar = false;
            
            const ytBtn = document.getElementById('lnk-youtube');
            if(config.showYoutube !== false && config.youtubeLink && config.youtubeLink.trim() !== "") {
                ytBtn.href = config.youtubeLink;
                ytBtn.classList.remove('hidden');
                showSocialBar = true;
            } else {
                ytBtn.classList.add('hidden');
            }

            const waGroupBtn = document.getElementById('lnk-wagroup');
            if(config.showWaGroup !== false && config.whatsappGroupLink && config.whatsappGroupLink.trim() !== "") {
                waGroupBtn.href = config.whatsappGroupLink;
                waGroupBtn.classList.remove('hidden');
                showSocialBar = true;
            } else {
                waGroupBtn.classList.add('hidden');
            }

            if(config.showSlogan !== false) {
                showSocialBar = true;
            }

            const socialBarNode = document.getElementById('social-channels-bar');
            if(showSocialBar) {
                socialBarNode.classList.remove('hidden');
            } else {
                socialBarNode.classList.add('hidden');
            }
        });

        // 2. LIVE DYNAMIC NOTICES CONTAINER RENDERING
        database.ref('notices').on('value', (snapshot) => {
            const container = document.getElementById('public-notices-container');
            container.innerHTML = ""; 

            const data = snapshot.val();
            
            if (!data) {
                container.innerHTML = `
                    <div class="bg-white border border-slate-200 p-8 md:p-12 rounded-2xl text-center text-slate-400 max-w-md mx-auto shadow-xs">
                        <div class="text-slate-300 text-4xl md:text-5xl mb-3"><i class="fa-regular fa-folder-open"></i></div>
                        <p class="font-medium text-xs md:text-sm tracking-wide">No active notices are listed at this moment.</p>
                    </div>`;
                return;
            }

            const noticesList = [];
            Object.keys(data).forEach(key => {
                noticesList.push(data[key]);
            });
            noticesList.reverse();
            
            const searchBox = document.getElementById('noticeSearch');

if(searchBox){
    searchBox.addEventListener('input', function() {
        const searchText = this.value.toLowerCase();

        document.querySelectorAll('#public-notices-container article').forEach(card => {
            if(card.innerText.toLowerCase().includes(searchText)){
                card.style.display = '';
            } else {
                card.style.display = 'none';
            }
        });
    });
}

            noticesList.forEach((item) => {
                const noticeCard = document.createElement('article');
                noticeCard.className = "bg-white rounded-2xl border border-slate-200 overflow-hidden card-shadow-smooth transition-all duration-300 flex flex-col md:flex-row group";

                let imgHTML = "";
                let contentWidthClass = "w-full";

                if (item.image) {
                    contentWidthClass = "w-full md:w-3/5"; 
                    imgHTML = `
                        <div onclick="openModal('${item.title.replace(/'/g, "\\'")}', '${item.desc.replace(/\n/g, '\\n').replace(/'/g, "\\'")}', '${item.image}', 'notices')" class="w-full md:w-2/5 bg-slate-50/60 border-b md:border-b-0 md:border-r border-slate-200/60 flex justify-center items-center p-4 min-h-[200px] sm:min-h-[240px] cursor-pointer">
                            <img src="${item.image}" alt="Notice Asset" class="w-full h-full max-h-[260px] md:max-h-[280px] object-contain rounded-xl group-hover:scale-[1.01] transition duration-300" loading="lazy">
                        </div>`;
                }

                const whatsappText = encodeURIComponent(`Hello Arif Bhai, mujhe iske baare me janna hai:\n📌 *${item.title}*`);
                const whatsappUrl = `https://api.whatsapp.com/send?phone=91${globalPhone}&text=${whatsappText}`;
                
                const safeTitle = (item.title || "").replace(/'/g, "\\'");
                const safeDesc = (item.desc || "").replace(/\n/g, '\\n').replace(/'/g, "\\'");
                const safeImage = (item.image || "").replace(/'/g, "\\'");

                noticeCard.innerHTML = `
                    ${imgHTML}
                    <div class="${contentWidthClass} p-5 md:p-6 flex flex-col justify-between space-y-4">
                        <div onclick="openModal('${safeTitle}', '${safeDesc}', '${safeImage}', 'notices')" class="space-y-3 cursor-pointer">
                            <div class="border-b-2 border-slate-100 pb-2 group-hover:border-amber-500/30 transition duration-300">
                                <h2 class="text-lg md:text-2xl font-extrabold text-slate-900 tracking-tight leading-snug group-hover:text-amber-600 transition duration-150">${item.title}</h2>
                            </div>
                            <p class="text-xs md:text-sm text-slate-600 line-clamp-4 whitespace-pre-wrap font-normal leading-relaxed tracking-wide font-sans">${item.desc}</p>
                        </div>
                        
                        <div class="flex flex-row gap-3 pt-2 w-full">
                            <a href="${whatsappUrl}" target="_blank" class="flex-1 flex items-center justify-center gap-1.5 md:gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs md:text-sm font-bold py-3 px-3 md:px-4 rounded-xl shadow-xs hover:shadow-md transition duration-200 text-center">
                                <i class="fa-brands fa-whatsapp text-sm md:text-base"></i> Process Order
                            </a>
                            <button onclick="sharePost('${safeTitle}', '${safeImage}')" class="flex-1 flex items-center justify-center gap-1.5 md:gap-2 bg-slate-50 hover:bg-slate-100 text-slate-600 hover:text-slate-800 text-xs md:text-sm font-bold py-3 px-3 md:px-4 rounded-xl border border-slate-200 transition duration-150 cursor-pointer text-center">
                                <i class="fa-solid fa-share-nodes text-blue-500"></i> Share Post
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(noticeCard);
            });
        });

        // 3. NEW: LIVE DYNAMIC SERVICES CONTAINER RENDERING
        database.ref('services').on('value', (snapshot) => {
            const container = document.getElementById('public-services-container');
            container.innerHTML = ""; 

            const data = snapshot.val();
            
            if (!data) {
                container.innerHTML = `
                    <div class="bg-white border border-slate-200 p-8 md:p-12 rounded-2xl text-center text-slate-400 max-w-md mx-auto shadow-xs">
                        <div class="text-slate-300 text-4xl md:text-5xl mb-3"><i class="fa-solid fa-gears"></i></div>
                        <p class="font-medium text-xs md:text-sm tracking-wide">Our services catalog is updating. Check back soon!</p>
                    </div>`;
                return;
            }

            const servicesList = [];
            Object.keys(data).forEach(key => {
                servicesList.push(data[key]);
            });
            servicesList.reverse();

            servicesList.forEach((item) => {
                const serviceCard = document.createElement('article');
                serviceCard.className = "bg-white rounded-2xl border border-slate-200 overflow-hidden card-shadow-smooth transition-all duration-300 flex flex-col md:flex-row group";

                let imgHTML = "";
                let contentWidthClass = "w-full";

                if (item.image) {
                    contentWidthClass = "w-full md:w-3/5"; 
                    imgHTML = `
                        <div onclick="openModal('${item.title.replace(/'/g, "\\'")}', '${item.desc.replace(/\n/g, '\\n').replace(/'/g, "\\'")}', '${item.image}', 'services')" class="w-full md:w-2/5 bg-slate-50/60 border-b md:border-b-0 md:border-r border-slate-200/60 flex justify-center items-center p-4 min-h-[200px] sm:min-h-[240px] cursor-pointer">
                            <img src="${item.image}" alt="Service Asset" class="w-full h-full max-h-[260px] md:max-h-[280px] object-contain rounded-xl group-hover:scale-[1.01] transition duration-300" loading="lazy">
                        </div>`;
                }

                const whatsappText = encodeURIComponent(`Hello Arif Bhai, mujhe is service ke baare me janna hai:\n🛠️ *${item.title}*`);
                const whatsappUrl = `https://api.whatsapp.com/send?phone=91${globalPhone}&text=${whatsappText}`;
                
                const safeTitle = (item.title || "").replace(/'/g, "\\'");
                const safeDesc = (item.desc || "").replace(/\n/g, '\\n').replace(/'/g, "\\'");
                const safeImage = (item.image || "").replace(/'/g, "\\'");

                serviceCard.innerHTML = `
                    ${imgHTML}
                    <div class="${contentWidthClass} p-5 md:p-6 flex flex-col justify-between space-y-4">
                        <div onclick="openModal('${safeTitle}', '${safeDesc}', '${safeImage}', 'services')" class="space-y-3 cursor-pointer">
                            <div class="border-b-2 border-slate-100 pb-2 group-hover:border-amber-500/30 transition duration-300">
                                <h2 class="text-lg md:text-2xl font-extrabold text-slate-900 tracking-tight leading-snug group-hover:text-amber-600 transition duration-150">${item.title}</h2>
                            </div>
                            <p class="text-xs md:text-sm text-slate-600 line-clamp-4 whitespace-pre-wrap font-normal leading-relaxed tracking-wide font-sans">${item.desc}</p>
                        </div>
                        
                        <div class="flex flex-row gap-3 pt-2 w-full">
                            <a href="${whatsappUrl}" target="_blank" class="flex-1 flex items-center justify-center gap-1.5 md:gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs md:text-sm font-bold py-3 px-3 md:px-4 rounded-xl shadow-xs hover:shadow-md transition duration-200 text-center">
                                <i class="fa-brands fa-whatsapp text-sm md:text-base"></i> Order Service
                            </a>
                            <button onclick="sharePost('${safeTitle}', '${safeImage}')" class="flex-1 flex items-center justify-center gap-1.5 md:gap-2 bg-slate-50 hover:bg-slate-100 text-slate-600 hover:text-slate-800 text-xs md:text-sm font-bold py-3 px-3 md:px-4 rounded-xl border border-slate-200 transition duration-150 cursor-pointer text-center">
                                <i class="fa-solid fa-share-nodes text-blue-500"></i> Share Service
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(serviceCard);
            });
        });

        // HIGH-PERFORMANCE NATIVE IMAGE + TEXT SHARING INTERFACE
        async function sharePost(title, imageUrl) {
            const currentUrl = window.location.href;
            const fullShareText = `📢 *${title}*\n\nNeeche diye gaye link par click karke poori jankari dekhein:\n🔗 ${currentUrl}`;
            
            if (navigator.share && imageUrl && imageUrl.trim() !== "") {
                try {
                    const response = await fetch(imageUrl);
                    const blob = await response.blob();
                    
                    const mimeType = blob.type || 'image/jpeg';
                    const extension = mimeType.split('/')[1] || 'jpg';
                    const file = new File([blob], `notice-poster.${extension}`, { type: mimeType });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            title: title,
                            text: fullShareText,
                            files: [file]
                        });
                        return;
                    }
                } catch (error) {
                    console.log("Image conversion or sharing engine fallback triggered:", error);
                }
            }

            if (navigator.share) {
                navigator.share({
                    title: title,
                    text: fullShareText,
                    url: currentUrl
                }).catch(err => console.log(err));
            } else {
                navigator.clipboard.writeText(fullShareText)
                .then(() => alert("🚀 Link & Text copied successfully! Ready to paste and share."))
                .catch(() => alert("Clipboard block detected."));
            }
        }
    </script>
