<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Digital Portal - Notices & Services</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        .premium-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1.1px, transparent 1.1px), radial-gradient(#e2e8f0 1.1px, #f8fafc 1.1px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
        }
        .card-shadow-smooth {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 4px 12px -2px rgba(0, 0, 0, 0.03);
        }
        .card-shadow-smooth:hover {
            box-shadow: 0 20px 40px -5px rgba(245, 158, 11, 0.1), 0 8px 20px -4px rgba(0, 0, 0, 0.04);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="premium-bg text-slate-800 font-sans min-h-screen flex flex-col justify-between">

<header class="sticky top-0 z-50 backdrop-blur-md bg-white/90 border-b border-slate-200 w-full">
    <div class="w-full py-4 px-3 md:px-6">
        <div class="flex justify-between items-center max-w-7xl mx-auto">

            <div>
                <h1 class="text-xl font-bold">
                    <i class="fa-solid fa-shapes text-amber-500"></i>
                    Arif Online Center
                </h1>
            </div>

        </div>
    </div>
</header>

<!-- TAB -->
<div class="w-full bg-white border-b border-slate-200 sticky top-[70px] z-30">
    <div class="max-w-md mx-auto flex p-1.5 gap-2">

        <button id="btn-tab-notices" onclick="switchTab('notices')" class="flex-1 py-2 rounded-xl bg-slate-900 text-white font-bold">
            <i class="fa-regular fa-bell"></i> Notices
        </button>

        <button id="btn-tab-services" onclick="switchTab('services')" class="flex-1 py-2 rounded-xl bg-slate-100 text-slate-600 font-bold">
            <i class="fa-solid fa-magnifying-glass"></i> Search
        </button>

    </div>
</div>

<main class="max-w-4xl mx-auto px-4 py-6">

<!-- NOTICES -->
<div id="public-notices-container"></div>

<!-- SEARCH TAB -->
<div id="public-services-container" class="hidden space-y-4">

    <!-- SEARCH BAR -->
    <div class="bg-white p-3 border rounded-xl">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="globalSearchInput" type="text" placeholder="Search notices & services..." class="w-full outline-none">
        </div>
    </div>

</div>

</main>

<script>
firebase.initializeApp({
    apiKey: "AIzaSyB0w82POMs3HZ6Ay-3Z4g0nhLPGHNQCNlY",
    authDomain: "arif-online-3f79e.firebaseapp.com",
    databaseURL: "https://arif-online-3f79e-default-rtdb.firebaseio.com",
    projectId: "arif-online-3f79e"
});

const db = firebase.database();
let currentTab = "notices";

// TAB SWITCH
function switchTab(tab){
    currentTab = tab;

    document.getElementById("public-notices-container").classList.toggle("hidden", tab !== "notices");
    document.getElementById("public-services-container").classList.toggle("hidden", tab !== "services");

    document.getElementById("btn-tab-notices").className =
        tab === "notices"
        ? "flex-1 py-2 rounded-xl bg-slate-900 text-white font-bold"
        : "flex-1 py-2 rounded-xl bg-slate-100 text-slate-600 font-bold";

    document.getElementById("btn-tab-services").className =
        tab === "services"
        ? "flex-1 py-2 rounded-xl bg-slate-900 text-white font-bold"
        : "flex-1 py-2 rounded-xl bg-slate-100 text-slate-600 font-bold";

    document.getElementById("globalSearchInput").value = "";
}

// SEARCH FUNCTION
document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("globalSearchInput");

    if(input){
        input.addEventListener("input", () => {
            const val = input.value.toLowerCase();

            document.querySelectorAll("#public-notices-container article, #public-services-container article")
            .forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(val) ? "" : "none";
            });
        });
    }
});

</script>

</body>
</html>
