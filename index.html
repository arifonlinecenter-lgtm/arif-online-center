<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Digital Portal - Notices</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        .premium-bg { background-color: #f8fafc; background-image: radial-gradient(#e2e8f0 1.1px, transparent 1.1px), radial-gradient(#e2e8f0 1.1px, #f8fafc 1.1px); background-size: 24px 24px; background-position: 0 0, 12px 12px; }
        .card-shadow-smooth { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 4px 12px -2px rgba(0, 0, 0, 0.03); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="premium-bg text-slate-800 font-sans min-h-screen">

    <!-- Header Section -->
    <header class="sticky top-0 z-50 backdrop-blur-md bg-white/90 border-b border-slate-200 shadow-xs w-full">
        <div class="w-full py-4 px-3 md:px-6">
            <div class="flex flex-row items-center justify-between gap-2 max-w-7xl mx-auto w-full">
                <img id="logo-left" src="" class="hidden h-14 w-14 object-contain rounded-2xl bg-slate-50 border border-slate-200 p-1">
                <div class="flex flex-col items-center text-center flex-grow">
                    <h1 id="site-title" class="text-xl md:text-3xl font-black uppercase tracking-wider">Arif Online Center</h1>
                    <p id="site-address" class="text-xs font-semibold text-slate-500 mt-1"></p>
                </div>
                <img id="logo-right" src="" class="hidden h-14 w-14 object-contain rounded-2xl bg-slate-50 border border-slate-200 p-1">
            </div>
        </div>
    </header>

    <!-- Notices Main Content -->
    <main class="max-w-4xl w-full mx-auto px-4 py-10">
        <div id="public-notices-container" class="space-y-6"></div>
    </main>

    <!-- Details Modal -->
    <div id="details-modal" class="fixed inset-0 z-50 hidden bg-slate-950/60 backdrop-blur-md items-center justify-center p-4">
        <div id="modal-card" class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden transition-all scale-95 opacity-0">
            <div class="p-4 border-b flex justify-between items-center bg-slate-50">
                <span class="bg-amber-500 text-xs font-black px-3 py-1 rounded-md uppercase">Notice Info</span>
                <button onclick="closeModal()" class="h-8 w-8 rounded-full bg-slate-200 hover:bg-red-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 max-h-[60vh] overflow-y-auto">
                <img id="modal-image" src="" class="w-full h-64 object-contain rounded-xl mb-4 hidden">
                <h2 id="modal-title" class="text-2xl font-extrabold mb-2"></h2>
                <p id="modal-desc" class="text-slate-600 whitespace-pre-wrap"></p>
            </div>
            <div id="modal-actions" class="p-4 border-t bg-slate-50 flex gap-3"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB0w82POMs3HZ6Ay-3Z4g0nhLPGHNQCNlY",
            authDomain: "arif-online-3f79e.firebaseapp.com",
            databaseURL: "https://arif-online-3f79e-default-rtdb.firebaseio.com",
            projectId: "arif-online-3f79e",
            storageBucket: "arif-online-3f79e.firebasestorage.app",
            messagingSenderId: "535907035651",
            appId: "1:535907035651:web:630f5780842de82d2e7c36"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let globalPhone = "9504291254";

        function openModal(title, desc, imageUrl) {
            const modal = document.getElementById('details-modal');
            const modalCard = document.getElementById('modal-card');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            const modalImg = document.getElementById('modal-image');
            
            if(imageUrl) { modalImg.src = imageUrl; modalImg.classList.remove('hidden'); }
            else { modalImg.classList.add('hidden'); }

            const whatsappUrl = `https://api.whatsapp.com/send?phone=91${globalPhone}&text=${encodeURIComponent(`Hello Arif Bhai, mujhe iske baare me janna hai:\n📌 *${title}*`)}`;
            
            document.getElementById('modal-actions').innerHTML = `
                <a href="${whatsappUrl}" target="_blank" class="flex-1 flex items-center justify-center gap-2 bg-emerald-600 text-white font-bold py-3 rounded-xl"><i class="fa-brands fa-whatsapp"></i> Process Order</a>
                <button onclick="sharePost('${title.replace(/'/g, "\\'")}', '${(imageUrl||"").replace(/'/g, "\\'")}')" class="flex-1 flex items-center justify-center gap-2 bg-slate-100 font-bold py-3 rounded-xl"><i class="fa-solid fa-share-nodes text-blue-500"></i> Share Post</button>
            `;
            modal.classList.replace('hidden', 'flex');
            setTimeout(() => { modalCard.classList.replace('scale-95', 'scale-100'); modalCard.classList.replace('opacity-0', 'opacity-100'); }, 50);
        }

        function closeModal() {
            const modal = document.getElementById('details-modal');
            const modalCard = document.getElementById('modal-card');
            modalCard.classList.replace('scale-100', 'scale-95');
            modalCard.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => { modal.classList.replace('flex', 'hidden'); }, 200);
        }

        async function sharePost(title, imageUrl) {
            const fullShareText = `📢 *${title}*\n\nNeeche diye gaye link par click karke poori jankari dekhein:\n🔗 ${window.location.href}`;
            if (navigator.share && imageUrl) {
                try {
                    const response = await fetch(imageUrl);
                    const blob = await response.blob();
                    const file = new File([blob], "notice.jpg", { type: blob.type });
                    await navigator.share({ title: title, text: fullShareText, files: [file] });
                } catch { navigator.share({ title: title, text: fullShareText }); }
            } else { alert("Link copied!"); navigator.clipboard.writeText(fullShareText); }
        }

        database.ref('notices').on('value', (snapshot) => {
            const container = document.getElementById('public-notices-container');
            container.innerHTML = "";
            const data = snapshot.val();
            if(data) {
                Object.values(data).reverse().forEach((item) => {
                    const card = document.createElement('article');
                    card.className = "bg-white rounded-2xl border p-5 card-shadow-smooth flex flex-col md:flex-row gap-4";
                    card.innerHTML = `
                        ${item.image ? `<img src="${item.image}" class="w-full md:w-1/3 h-48 object-cover rounded-xl cursor-pointer" onclick="openModal('${item.title.replace(/'/g, "\\'")}', '${item.desc.replace(/'/g, "\\'")}', '${item.image}')">` : ""}
                        <div class="flex-1">
                            <h2 class="text-xl font-bold mb-2">${item.title}</h2>
                            <p class="text-slate-600 text-sm mb-4 line-clamp-3">${item.desc}</p>
                            <div class="flex gap-2">
                                <a href="https://api.whatsapp.com/send?phone=91${globalPhone}&text=Hello, I am interested in: ${item.title}" target="_blank" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-xs"><i class="fa-brands fa-whatsapp"></i> Order</a>
                                <button onclick="sharePost('${item.title.replace(/'/g, "\\'")}', '${(item.image||"").replace(/'/g, "\\'")}')" class="bg-slate-100 px-4 py-2 rounded-lg font-bold text-xs"><i class="fa-solid fa-share-nodes"></i> Share</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
