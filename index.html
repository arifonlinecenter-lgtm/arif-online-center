<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-browser-title">ARIF ONLINE CENTER - Official Portal</title>
    <!-- Tailwind CSS for modern UI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .notice-card { transition: all 0.3s ease; }
        .notice-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- HEADER / BRANDING -->
    <header class="bg-gradient-to-r from-[#1e3c72] to-[#2a5298] text-white py-6 px-4 shadow-md text-center">
        <h1 id="display-shop-name" class="text-3xl font-black tracking-wider uppercase drop-shadow-md">ARIF ONLINE CENTER</h1>
        <p id="display-shop-address-wrapper" class="text-xs text-yellow-400 font-bold mt-1 tracking-wide">
            <i class="fa-solid fa-location-dot mr-1"></i> <span id="display-shop-address">MOMIN TOLA SAHEBGANJ MASJID ROAD, BHAGALPUR</span>
        </p>
    </header>

    <!-- MAIN CONTENT CONTAINER -->
    <main class="flex-grow container mx-auto p-4 max-w-2xl">
        
        <!-- USER VIEW: LIVE NOTICES (ALWAYS PUBLIC) -->
        <section id="user-view" class="block">
            <h2 class="text-xl font-extrabold text-blue-900 mb-4 border-b-2 border-yellow-400 pb-1 flex items-center gap-2">
                <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>
                Latest Server Notices
            </h2>
            <div id="notices-container" class="space-y-4">
                <!-- Notices will load here automatically -->
            </div>
        </section>

    </main>

    <!-- FOOTER SYSTEM -->
    <footer class="bg-gray-900 text-gray-400 py-6 px-4 text-center text-xs mt-auto border-t-4 border-yellow-400">
        <p id="display-shop-slogan" class="font-bold text-white mb-1">⚡ ARIF ONLINE CENTER - AAPKI SEVA ME SADA TATPAR ⚡</p>
        <p class="mb-3">All digital services, admissions, scholarships & form fills delivered instantly.</p>
        
        <!-- Live Footer WhatsApp Trigger -->
        <div id="display-phone-wrapper" class="block">
            <button onclick="contactWhatsApp()" class="inline-flex items-center gap-2 bg-[#25D366] text-white font-bold px-4 py-2 rounded-full text-sm shadow hover:bg-[#20ba5a] cursor-pointer transition">
                <i class="fa-brands fa-whatsapp text-lg"></i> Contact on WhatsApp
            </button>
        </div>
    </footer>

    <script>
        // Load Configurations
        let config = JSON.parse(localStorage.getItem('arif_config')) || {
            shopName: "ARIF ONLINE CENTER",
            address: "MOMIN TOLA SAHEBGANJ MASJID ROAD, BHAGALPUR",
            phone: "9504291254",
            slogan: "⚡ ARIF ONLINE CENTER - AAPKI SEVA ME SADA TATPAR ⚡",
            showAddress: true,
            showPhone: true
        };

        let notices = JSON.parse(localStorage.getItem('arif_notices')) || [];

        document.addEventListener("DOMContentLoaded", () => {
            applyConfigUI();
            renderNotices();
        });

        function applyConfigUI() {
            document.getElementById('site-browser-title').innerText = `${config.shopName} - Official Portal`;
            document.getElementById('display-shop-name').innerText = config.shopName;
            document.getElementById('display-shop-address').innerText = config.address;
            document.getElementById('display-shop-slogan').innerText = config.slogan;

            const addrWrapper = document.getElementById('display-shop-address-wrapper');
            addrWrapper.style.display = config.showAddress ? "block" : "none";

            const phoneWrapper = document.getElementById('display-phone-wrapper');
            phoneWrapper.className = config.showPhone ? "block" : "hidden";
        }

        function contactWhatsApp(customText = `Hello, Mujhe ${config.shopName} se ek service online karwani hai.`) {
            if(!config.phone) {
                alert("WhatsApp contact number is currently disabled!");
                return;
            }
            window.open(`https://api.whatsapp.com/send?phone=91${config.phone}&text=${encodeURIComponent(customText)}`, '_blank');
        }

        function renderNotices() {
            const container = document.getElementById('notices-container');
            container.innerHTML = "";
            
            if(notices.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 my-8 py-4 bg-white rounded shadow border border-dashed text-xs">No active announcements at the moment.</p>`;
                return;
            }

            notices.forEach((item) => {
                const card = document.createElement('div');
                card.className = "notice-card bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col gap-3 relative overflow-hidden";
                let imgHtml = item.image ? `<img src="${item.image}" alt="Notice Photo" class="w-full rounded-lg max-h-96 object-contain border bg-gray-50 my-1">` : '';
                
                let actionBtnHtml = config.showPhone ? `
                    <button onclick="contactWhatsApp('Mujhe is post ke bare me janna hai: ${encodeURIComponent(item.title)}')" class="mt-2 w-full bg-[#25D366] text-white text-xs font-bold py-2 rounded-lg hover:bg-[#20ba5a] transition flex items-center justify-center gap-1.5 cursor-pointer">
                        <i class="fa-brands fa-whatsapp text-sm"></i> Order Service / Contact Center
                    </button>
                ` : '';

                card.innerHTML = `
                    <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-900"></div>
                    <div class="flex justify-between items-start">
                        <h3 class="text-base font-extrabold text-gray-900 leading-snug">${item.title}</h3>
                        <span class="text-[10px] text-gray-400 bg-gray-100 px-2 py-0.5 rounded font-mono">${item.date}</span>
                    </div>
                    <p class="text-sm text-gray-600 whitespace-pre-wrap leading-relaxed">${item.desc}</p>
                    ${imgHtml}
                    ${actionBtnHtml}
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
