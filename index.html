<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Official Notice Board</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col justify-between selection:bg-blue-600 selection:text-white">

    <header class="bg-gradient-to-r from-blue-900 via-indigo-900 to-blue-950 text-white shadow-xl border-b-4 border-amber-500 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-5 text-center">
            <h1 id="site-title" class="text-2xl md:text-4xl font-black tracking-wide drop-shadow-md uppercase">
                Loading...
            </h1>
            <p id="site-address" class="text-xs md:text-sm font-semibold text-blue-200 mt-1 tracking-wider flex items-center justify-center gap-1.5">
            </p>
        </div>
    </header>

    <main class="max-w-3xl w-full mx-auto px-4 py-8 flex-grow">
        
        <div class="flex items-center gap-2 mb-6 bg-blue-50 border border-blue-200 p-3 rounded-xl shadow-xs">
            <span class="flex h-2.5 w-2.5 relative">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-600"></span>
            </span>
            <p class="text-xs font-bold text-slate-700 uppercase tracking-wider">Latest Updates & Public Bulletins</p>
        </div>

        <div id="public-notices-container" class="space-y-6">
            <div class="text-center py-12 text-slate-400 font-medium text-sm">
                <i class="fa-solid fa-circle-notch animate-spin text-2xl text-blue-900 mb-2"></i>
                <p>Connecting to live servers...</p>
            </div>
        </div>
    </main>

    <a id="floating-whatsapp" href="#" target="_blank" class="hidden fixed bottom-6 right-6 bg-green-500 hover:bg-green-600 text-white p-4 rounded-full shadow-2xl transition-all transform hover:scale-110 items-center justify-center z-50 group">
        <i class="fa-brands fa-whatsapp text-3xl animate-pulse"></i>
        <span class="absolute right-14 bg-slate-900 text-white text-xs font-bold px-3 py-1.5 rounded-lg whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity shadow-md">Chat with Us</span>
    </a>

    <footer class="bg-slate-900 text-slate-400 text-center py-6 border-t border-slate-800 mt-12">
        <div class="max-w-4xl mx-auto px-4 space-y-2">
            <p id="site-slogan" class="text-amber-400 font-bold text-sm tracking-wide">
            </p>
            <p class="text-xs font-medium text-slate-500">&copy; 2026 All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB0w82POMs3HZ6Ay-3Z4g0nhLPGHNQCNlY",
            authDomain: "arif-online-3f79e.firebaseapp.com",
            databaseURL: "https://arif-online-3f79e-default-rtdb.firebaseio.com",
            projectId: "arif-online-3f79e",
            storageBucket: "arif-online-3f79e.firebasestorage.app",
            messagingSenderId: "535907035651",
            appId: "1:535907035651:web:630f5780842de82d2e7c36"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let globalPhone = "9504291254"; // Default fallback number

        // 1. LIVE WEBSITE TEXT & VISIBILITY SYNC
        database.ref('config').on('value', (snapshot) => {
            const config = snapshot.val() || {};
            
            if(config.phone) globalPhone = config.phone;

            const titleEl = document.getElementById('site-title');
            const addressEl = document.getElementById('site-address');
            const sloganEl = document.getElementById('site-slogan');
            const whatsappBtn = document.getElementById('floating-whatsapp');

            titleEl.innerText = config.shopName || "ARIF ONLINE CENTER";
            addressEl.innerHTML = `<i class="fa-solid fa-location-dot text-amber-500"></i> ${config.address || 'MOMIN TOLA SAHEBGANJ MASJID ROAD, BHAGALPUR'}`;
            sloganEl.innerText = config.slogan || "⚡ ARIF ONLINE CENTER - AAPKI SEVA ME SADA TATPAR ⚡";

            titleEl.style.display = (config.showName !== false) ? 'block' : 'none';
            addressEl.style.display = (config.showAddress !== false) ? 'flex' : 'none';
            sloganEl.style.display = (config.showSlogan !== false) ? 'block' : 'none';

            if (config.showPhone !== false && config.phone) {
                whatsappBtn.href = `https://api.whatsapp.com/send?phone=91${config.phone}&text=Hello! I need some assistance regarding your online services.`;
                whatsappBtn.classList.replace('hidden', 'flex');
            } else {
                whatsappBtn.classList.replace('flex', 'hidden');
            }
        });

        // 2. LIVE POSTS, WHATSAPP ORDER & SHARE SYSTEM
        database.ref('notices').on('value', (snapshot) => {
            const container = document.getElementById('public-notices-container');
            container.innerHTML = ""; 

            const data = snapshot.val();
            
            if (!data) {
                container.innerHTML = `
                    <div class="bg-white p-8 rounded-2xl border text-center text-slate-500 shadow-xs">
                        <div class="text-slate-300 text-5xl mb-3"><i class="fa-solid fa-folder-open"></i></div>
                        <p class="font-bold text-base">No Active Notices Right Now</p>
                    </div>`;
                return;
            }

            const noticesList = [];
            Object.keys(data).forEach(key => {
                noticesList.push(data[key]);
            });
            noticesList.reverse();

            noticesList.forEach((item) => {
                const noticeCard = document.createElement('article');
                noticeCard.className = "bg-white rounded-2xl border border-slate-200/80 shadow-sm overflow-hidden hover:shadow-md transition duration-200 flex flex-col";

                let imgHTML = "";
                if (item.image) {
                    imgHTML = `
                        <div class="bg-slate-100 border-b border-slate-100 max-h-[450px] overflow-hidden flex justify-center items-center">
                            <img src="${item.image}" alt="Notice Visual" class="w-full h-auto object-contain max-h-[450px]" loading="lazy">
                        </div>`;
                }

                // WhatsApp message encode karna dynamic title ke sath
                const whatsappText = encodeURIComponent(`Hello Arif Bhai, mujhe iske liye online apply karwana hai ya iski details chahiye:\n📌 *${item.title}*`);
                const whatsappUrl = `https://api.whatsapp.com/send?phone=91${globalPhone}&text=${whatsappText}`;

                // Share function ke liye text pass karna
                const shareTitle = item.title;

                noticeCard.innerHTML = `
                    ${imgHTML}
                    <div class="p-5 md:p-6 space-y-4 flex-grow flex flex-col justify-between">
                        <div class="space-y-3">
                            <div class="flex items-center justify-between gap-4">
                                <h2 class="text-base md:text-xl font-bold text-slate-900 tracking-tight leading-snug">${item.title}</h2>
                            </div>
                            <p class="text-xs font-bold text-slate-400 flex items-center gap-1"><i class="fa-regular fa-clock"></i> ${item.date}</p>
                            <hr class="border-slate-100">
                            <p class="text-xs md:text-sm text-slate-700 whitespace-pre-wrap font-medium leading-relaxed font-sans">${item.desc}</p>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3 pt-2 border-t border-slate-100">
                            <a href="${whatsappUrl}" target="_blank" class="flex items-center justify-center gap-1.5 bg-green-600 hover:bg-green-700 text-white text-xs md:text-sm font-bold py-2.5 px-4 rounded-xl shadow-xs transition duration-150">
                                <i class="fa-brands fa-whatsapp text-sm md:text-base"></i> Order on WhatsApp
                            </a>
                            <button onclick="sharePost('${escape(shareTitle)}')" class="flex items-center justify-center gap-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs md:text-sm font-bold py-2.5 px-4 rounded-xl transition duration-150 cursor-pointer">
                                <i class="fa-solid fa-share-nodes text-sm md:text-base text-blue-600"></i> Share Post
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(noticeCard);
            });
        });

        // 🔗 SHARE POST FUNCTION
        function sharePost(escapedTitle) {
            const title = unescape(escapedTitle);
            const currentUrl = window.location.href;
            const fullShareText = `📢 *${title}*\n\nNeeche diye gaye link par click karke poori jankari dekhein:\n🔗 ${currentUrl}`;

            // Agar browser share API support karta hai (jaise mobile me)
            if (navigator.share) {
                navigator.share({
                    title: title,
                    text: fullShareText,
                    url: currentUrl
                }).catch(err => console.log(err));
            } else {
                // Agar normal browser hai toh clipboard me link copy ho jayega
                navigator.clipboard.writeText(fullShareText)
                .then(() => {
                    alert("🚀 Post link and text copied to clipboard! Paste it anywhere to share.");
                })
                .catch(() => {
                    alert("Failed to copy link.");
                });
            }
        }
    </script>
</body>
</html>
