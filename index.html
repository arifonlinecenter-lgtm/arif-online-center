<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Digital Portal - Notices & Search</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        .premium-bg { background-color: #f8fafc; background-image: radial-gradient(#e2e8f0 1.1px, transparent 1.1px), radial-gradient(#e2e8f0 1.1px, #f8fafc 1.1px); background-size: 24px 24px; background-position: 0 0, 12px 12px; }
        .card-shadow-smooth { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 4px 12px -2px rgba(0, 0, 0, 0.03); }
        .card-shadow-smooth:hover { box-shadow: 0 20px 40px -5px rgba(245, 158, 11, 0.1), 0 8px 20px -4px rgba(0, 0, 0, 0.04); border-color: rgba(245, 158, 11, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="premium-bg text-slate-800 font-sans min-h-screen flex flex-col justify-between selection:bg-amber-500 selection:text-slate-900 antialiased">

    <header class="sticky top-0 z-50 backdrop-blur-md bg-white/90 border-b border-slate-200 shadow-xs w-full">
        <div class="w-full py-4 px-3 md:px-6">
            <div class="flex flex-row items-center justify-between gap-2 md:gap-6 max-w-7xl mx-auto w-full">
                <div class="flex items-center justify-start shrink-0">
                    <img id="logo-left" src="" alt="Logo Left" class="hidden h-11 w-11 sm:h-14 sm:w-14 md:h-16 md:w-16 object-contain rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 p-0.5 sm:p-1 shadow-xs">
                </div>
                <div class="flex flex-col items-center text-center flex-grow px-1">
                    <h1 id="site-title" class="text-sm sm:text-2xl md:text-3xl font-black uppercase tracking-wider flex items-center justify-center gap-1 sm:gap-2"></h1>
                    <p id="site-address" class="text-[8px] sm:text-[10px] md:text-xs font-semibold text-slate-500 mt-0.5 sm:mt-1 tracking-wide flex items-center justify-center gap-1"></p>
                </div>
                <div class="flex items-center justify-end shrink-0">
                    <img id="logo-right" src="" alt="Logo Right" class="hidden h-11 w-11 sm:h-14 sm:w-14 md:h-16 md:w-16 object-contain rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 p-0.5 sm:p-1 shadow-xs">
                </div>
            </div>
        </div>
    </header>

    <section id="social-channels-bar" class="bg-slate-900 text-white border-b-4 border-amber-500 py-2.5 px-4 shadow-md sticky top-[69px] md:top-[85px] z-40 hidden">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3 text-center sm:text-left">
            <div class="flex items-center gap-2">
                <span class="h-1.5 w-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                <p id="top-bar-slogan" class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-slate-300"></p>
            </div>
            <div class="flex items-center gap-2.5">
                <a id="lnk-youtube" href="#" target="_blank" class="hidden bg-red-600 hover:bg-red-700 text-white text-[10px] font-black px-3 py-1.5 rounded-lg shadow-xs transition duration-200 flex items-center gap-1.5 uppercase tracking-wider"><i class="fa-brands fa-youtube text-xs"></i> YouTube</a>
                <a id="lnk-wagroup" href="#" target="_blank" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] font-black px-3 py-1.5 rounded-lg shadow-xs transition duration-200 flex items-center gap-1.5 uppercase tracking-wider"><i class="fa-brands fa-whatsapp text-xs"></i> Join Group</a>
            </div>
        </div>
    </section>

    <div class="w-full bg-white border-b border-slate-200 sticky top-[115px] md:top-[133px] z-30 shadow-xs">
        <div class="max-w-md mx-auto flex p-1.5 gap-2">
            <button id="btn-tab-notices" onclick="switchTab('notices')" class="flex-1 py-2.5 px-4 rounded-xl text-xs md:text-sm font-bold tracking-wider uppercase transition-all duration-200 cursor-pointer flex items-center justify-center gap-2 bg-slate-900 text-white shadow-xs">
                <i class="fa-regular fa-bell"></i> Notices
            </button>
            <button id="btn-tab-search" onclick="switchTab('search')" class="flex-1 py-2.5 px-4 rounded-xl text-xs md:text-sm font-bold tracking-wider uppercase transition-all duration-200 cursor-pointer flex items-center justify-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200">
                <i class="fa-solid fa-magnifying-glass"></i> Search
            </button>
        </div>
    </div>

    <main class="max-w-4xl w-full mx-auto px-4 py-6 md:py-10 flex-grow relative z-10">
        <div class="flex items-center gap-3 mb-6 md:mb-8 bg-white border border-slate-200 p-3 rounded-2xl shadow-xs">
            <span class="bg-slate-900 text-white text-[9px] md:text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded-md shrink-0">Live Update</span>
            <span id="live-banner-text" class="text-xs font-medium text-slate-600 tracking-wide truncate">Welcome to our official public dashboard.</span>
        </div>

        <div id="search-box-container" class="hidden mb-6">
            <input type="text" id="search-input" onkeyup="filterNotices()" placeholder="Search notices by title..." class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 outline-none shadow-sm text-sm">
        </div>

        <div id="public-notices-container" class="space-y-4 md:space-y-6">
            <div class="text-center py-24 text-slate-400">
                <div class="inline-block relative w-10 h-10 mb-2">
                    <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
                <p class="text-xs font-bold uppercase tracking-widest text-slate-500">Syncing live server feed...</p>
            </div>
        </div>
    </main>

    <div id="details-modal" class="fixed inset-0 z-50 hidden bg-slate-950/60 backdrop-blur-md items-center justify-center p-4 transition-all duration-300">
        <div class="bg-white w-full max-w-2xl rounded-3xl border border-slate-200 shadow-2xl overflow-hidden max-h-[85vh] flex flex-col transform scale-95 opacity-0 transition-all duration-300" id="modal-card">
            <div class="p-4 md:p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                <span id="modal-tag" class="bg-amber-500 text-slate-950 text-[10px] font-black uppercase tracking-widest px-2.5 py-1 rounded-md">Details View</span>
                <button onclick="closeModal()" class="h-8 w-8 rounded-full bg-slate-200 hover:bg-red-500 hover:text-white transition-all text-slate-600 flex items-center justify-center cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-5 md:p-8 overflow-y-auto space-y-5 no-scrollbar">
                <div id="modal-img-container" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 flex justify-center items-center hidden">
                    <img id="modal-image" src="" alt="Preview" class="max-h-[300px] object-contain rounded-xl">
                </div>
                <div class="space-y-3">
                    <h2 id="modal-title" class="text-xl md:text-3xl font-extrabold text-slate-900 tracking-tight leading-snug"></h2>
                    <hr class="border-slate-100"><p id="modal-desc" class="text-sm md:text-base text-slate-600 whitespace-pre-wrap leading-relaxed tracking-wide font-sans"></p>
                </div>
            </div>
            <div id="modal-actions" class="p-4 md:p-6 border-t border-slate-100 bg-slate-50 flex flex-row gap-3"></div>
        </div>
    </div>

    <a id="floating-whatsapp" href="#" target="_blank" class="hidden fixed bottom-5 right-5 md:bottom-6 md:right-6 bg-emerald-500 hover:bg-emerald-600 text-white p-3.5 md:p-4 rounded-2xl shadow-lg hover:shadow-emerald-500/20 transition-all duration-300 transform hover:scale-105 items-center justify-center z-50 group border border-emerald-400/10">
        <i class="fa-brands fa-whatsapp text-xl md:text-2xl"></i>
    </a>

    <footer class="bg-white border-t border-slate-200 text-slate-500 text-center py-6 md:py-8 relative z-10">
        <div class="max-w-4xl mx-auto px-4"><p class="text-[9px] md:text-[10px] font-medium tracking-wider text-slate-400">&copy; 2026 ARIF ONLINE CENTER. All Rights Reserved.</p></div>
    </footer>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB0w82POMs3HZ6Ay-3Z4g0nhLPGHNQCNlY", authDomain: "arif-online-3f79e.firebaseapp.com", databaseURL: "https://arif-online-3f79e-default-rtdb.firebaseio.com", projectId: "arif-online-3f79e", storageBucket: "arif-online-3f79e.firebasestorage.app", messagingSenderId: "535907035651", appId: "1:535907035651:web:630f5780842de82d2e7c36" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let globalPhone = "9504291254";

        // Tab Switcher
        function switchTab(tabName) {
            const noticesBtn = document.getElementById('btn-tab-notices');
            const searchBtn = document.getElementById('btn-tab-search');
            const searchCont = document.getElementById('search-box-container');
            const bannerText = document.getElementById('live-banner-text');

            if(tabName === 'notices') {
                noticesBtn.className = "flex-1 py-2.5 px-4 rounded-xl text-xs md:text-sm font-bold tracking-wider uppercase transition-all duration-200 cursor-pointer flex items-center justify-center gap-2 bg-slate-900 text-white shadow-xs";
                searchBtn.className = "flex-1 py-2.5 px-4 rounded-xl text-xs md:text-sm font-bold tracking-wider uppercase transition-all duration-200 cursor-pointer flex items-center justify-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200";
                searchCont.classList.add('hidden');
                bannerText.innerText = "Welcome to our official public dashboard.";
            } else {
                searchBtn.className = "flex-1 py-2.5 px-4 rounded-xl text-xs md:text-sm font-bold tracking-wider uppercase transition-all duration-200 cursor-pointer flex items-center justify-center gap-2 bg-slate-900 text-white shadow-xs";
                noticesBtn.className = "flex-1 py-2.5 px-4 rounded-xl text-xs md:text-sm font-bold tracking-wider uppercase transition-all duration-200 cursor-pointer flex items-center justify-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200";
                searchCont.classList.remove('hidden');
                bannerText.innerText = "Search any notice by typing the title below.";
            }
        }

        // Search Filter
        function filterNotices() {
            let input = document.getElementById('search-input').value.toLowerCase();
            let container = document.getElementById('public-notices-container');
            let articles = container.getElementsByTagName('article');
            for (let i = 0; i < articles.length; i++) {
                let title = articles[i].querySelector('h2').innerText.toLowerCase();
                articles[i].style.display = title.includes(input) ? "" : "none";
            }
        }

        // Modal and Firebase Logic (Re-implemented for compatibility)
        function openModal(title, desc, imageUrl, type) {
            const modal = document.getElementById('details-modal');
            const modalCard = document.getElementById('modal-card');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            const imgCont = document.getElementById('modal-img-container');
            if(imageUrl) { document.getElementById('modal-image').src = imageUrl; imgCont.classList.remove('hidden'); } else { imgCont.classList.add('hidden'); }
            
            const whatsappText = encodeURIComponent(`Hello, I want to know about: ${title}`);
            document.getElementById('modal-actions').innerHTML = `<a href="https://api.whatsapp.com/send?phone=91${globalPhone}&text=${whatsappText}" target="_blank" class="flex-1 flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-3 px-4 rounded-xl">Process</a>`;
            modal.classList.replace('hidden', 'flex');
            setTimeout(() => { modalCard.classList.replace('scale-95', 'scale-100'); modalCard.classList.replace('opacity-0', 'opacity-100'); }, 50);
        }

        function closeModal() {
            const modal = document.getElementById('details-modal');
            const modalCard = document.getElementById('modal-card');
            modalCard.classList.replace('scale-100', 'scale-95');
            modalCard.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => modal.classList.replace('flex', 'hidden'), 200);
        }

        // Firebase Listeners (Notices only)
        database.ref('notices').on('value', (snapshot) => {
            const container = document.getElementById('public-notices-container');
            container.innerHTML = "";
            const data = snapshot.val();
            if(!data) return;
            Object.values(data).reverse().forEach(item => {
                const article = document.createElement('article');
                article.className = "bg-white rounded-2xl border border-slate-200 p-5 flex flex-col md:flex-row gap-4 card-shadow-smooth";
                article.innerHTML = `
                    <div class="flex-grow">
                        <h2 class="text-lg font-extrabold text-slate-900">${item.title}</h2>
                        <p class="text-sm text-slate-600 mt-2">${item.desc}</p>
                    </div>
                    <button onclick="openModal('${item.title}', '${item.desc}', '${item.image || ''}')" class="bg-amber-500 text-white px-4 py-2 rounded-lg text-xs font-bold">View Details</button>
                `;
                container.appendChild(article);
            });
        });

        // Config listener (omitted for brevity, keep your original one)
    </script>
</body>
</html>
