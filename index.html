<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Digital Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Header: Logo aur layout pehle jaisa -->
    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <img id="logo-left" src="" alt="Logo Left" class="h-12 w-12 object-contain hidden">
            <div class="text-center flex-1">
                <h1 id="site-title" class="text-xl font-bold uppercase tracking-tight">ARIF ONLINE CENTER</h1>
                <p id="site-address" class="text-xs text-gray-500 font-medium tracking-wide"></p>
            </div>
            <img id="logo-right" src="" alt="Logo Right" class="h-12 w-12 object-contain hidden">
        </div>
    </header>

    <!-- Main Content: Post View structure same rakha gaya hai -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <div id="public-notices-container" class="grid gap-6">
            <!-- Notices yahan dynamically load honge -->
            <div class="text-center py-20 text-gray-400">Loading notices...</div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB0w82POMs3HZ6Ay-3Z4g0nhLPGHNQCNlY",
            authDomain: "arif-online-3f79e.firebaseapp.com",
            databaseURL: "https://arif-online-3f79e-default-rtdb.firebaseio.com",
            projectId: "arif-online-3f79e",
            storageBucket: "arif-online-3f79e.firebasestorage.app",
            messagingSenderId: "535907035651",
            appId: "1:535907035651:web:630f5780842de82d2e7c36"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Config fetch: Logo aur Title ke liye
        database.ref('config').on('value', (s) => {
            const c = s.val() || {};
            if(c.logoLeft) { const img = document.getElementById('logo-left'); img.src = c.logoLeft; img.classList.remove('hidden'); }
            if(c.logoRight) { const img = document.getElementById('logo-right'); img.src = c.logoRight; img.classList.remove('hidden'); }
            if(c.title) document.getElementById('site-title').innerText = c.title;
            if(c.address) document.getElementById('site-address').innerText = c.address;
        });

        // Notices fetch: Post View pehle jaisa
        database.ref('notices').on('value', (s) => {
            const container = document.getElementById('public-notices-container');
            container.innerHTML = "";
            const data = s.val();
            if(!data) return;

            Object.values(data).reverse().forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-xl shadow border border-gray-100 hover:shadow-lg transition-shadow";
                card.innerHTML = `
                    ${item.image ? `<img src="${item.image}" class="w-full h-auto rounded-lg mb-4 object-cover">` : ""}
                    <h2 class="text-lg font-bold mb-2">${item.title}</h2>
                    <p class="text-gray-600 text-sm mb-4 whitespace-pre-wrap">${item.desc}</p>
                    <button onclick="window.open('https://wa.me/919504291254?text=Hello%20Arif%20Online%20Center,%20I%20am%20interested%20in:%20${encodeURIComponent(item.title)}', '_blank')" class="w-full bg-green-600 text-white font-bold py-2 rounded-lg text-sm uppercase tracking-wide hover:bg-green-700 transition">
                        <i class="fab fa-whatsapp mr-2"></i> Contact on WhatsApp
                    </button>
                `;
                container.appendChild(card);
            });
        });
    </script>
</body>
</html>
