<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Digital Portal - Notices</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Smooth subtle grid pattern background for clean premium aesthetic */
        .premium-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1.1px, transparent 1.1px), radial-gradient(#e2e8f0 1.1px, #f8fafc 1.1px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
        }
        .card-shadow-smooth {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 4px 12px -2px rgba(0, 0, 0, 0.03);
        }
        .card-shadow-smooth:hover {
            box-shadow: 0 20px 40px -5px rgba(245, 158, 11, 0.1), 0 8px 20px -4px rgba(0, 0, 0, 0.04);
            border-color: rgba(245, 158, 11, 0.3);
        }
    </style>
</head>
<body class="premium-bg text-slate-800 font-sans min-h-screen flex flex-col justify-between selection:bg-amber-500 selection:text-slate-900 antialiased">

    <header class="sticky top-0 z-50 backdrop-blur-md bg-white/90 border-b border-slate-200 shadow-xs w-full">
        <div class="w-full py-4 px-3 md:px-6">
            
            <div class="flex flex-row items-center justify-between gap-2 md:gap-6 max-w-7xl mx-auto w-full">
                
                <div class="flex items-center justify-start shrink-0">
                    <img id="logo-left" src="" alt="Logo Left" class="hidden h-11 w-11 sm:h-14 sm:w-14 md:h-16 md:w-16 object-contain rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 p-0.5 sm:p-1 shadow-xs">
                </div>
                
                <div class="flex flex-col items-center text-center flex-grow px-1">
                    <h1 id="site-title" class="text-sm sm:text-2xl md:text-3xl font-black uppercase tracking-wider flex items-center justify-center gap-1 sm:gap-2">
                        <i class="fa-solid fa-shapes text-amber-500 text-xs sm:text-lg md:text-2xl"></i>
                        <span class="text-slate-900">Arif</span> 
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-500 via-amber-600 to-orange-600 font-black tracking-wide">Online Center</span>
                    </h1>
                    <p id="site-address" class="text-[8px] sm:text-[10px] md:text-xs font-semibold text-slate-500 mt-0.5 sm:mt-1 tracking-wide flex items-center justify-center gap-1">
                        </p>
                </div>

                <div class="flex items-center justify-end shrink-0">
                    <img id="logo-right" src="" alt="Logo Right" class="hidden h-11 w-11 sm:h-14 sm:w-14 md:h-16 md:w-16 object-contain rounded-xl sm:rounded-2xl bg-slate-50 border border-slate-200 p-0.5 sm:p-1 shadow-xs">
                </div>

            </div>

        </div>
    </header>

    <main class="max-w-4xl w-full mx-auto px-4 py-6 md:py-10 flex-grow relative z-10">
        
        <div class="flex items-center gap-3 mb-6 md:mb-8 bg-white border border-slate-200 p-3 rounded-2xl shadow-xs">
            <span class="bg-slate-900 text-white text-[9px] md:text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded-md shrink-0">Live Update</span>
            <span class="text-xs font-medium text-slate-600 tracking-wide truncate">Welcome to our official public dashboard. Select any notice to proceed.</span>
        </div>

        <div id="public-notices-container" class="space-y-4 md:space-y-6">
            <div class="text-center py-24 text-slate-400">
                <div class="inline-block relative w-10 h-10 mb-2">
                    <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
                <p class="text-xs font-bold uppercase tracking-widest text-slate-500">Syncing live server feed...</p>
            </div>
        </div>
    </main>

    <a id="floating-whatsapp" href="#" target="_blank" class="hidden fixed bottom-5 right-5 md:bottom-6 md:right-6 bg-emerald-500 hover:bg-emerald-600 text-white p-3.5 md:p-4 rounded-2xl shadow-lg hover:shadow-emerald-500/20 transition-all duration-300 transform hover:scale-105 items-center justify-center z-50 group border border-emerald-400/10">
        <i class="fa-brands fa-whatsapp text-xl md:text-2xl"></i>
        <span class="absolute right-16 bg-slate-950 text-white text-[11px] font-bold px-3 py-2 rounded-xl whitespace-nowrap opacity-0 group-hover:opacity-100 transition-all duration-200 shadow-xl hidden md:inline">Contact Center</span>
    </a>

    <footer class="bg-white border-t border-slate-200 text-slate-500 text-center py-6 md:py-8 relative z-10">
        <div class="max-w-4xl mx-auto px-4 space-y-3">
            <p id="site-slogan" class="text-amber-600 font-bold text-[10px] md:text-xs uppercase tracking-widest">
                </p>
            <div class="h-px bg-slate-200 w-1/4 mx-auto"></div>
            <p class="text-[9px] md:text-[10px] font-medium tracking-wider text-slate-400">&copy; 2026 ARIF ONLINE CENTER. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB0w82POMs3HZ6Ay-3Z4g0nhLPGHNQCNlY",
            authDomain: "arif-online-3f79e.firebaseapp.com",
            databaseURL: "https://arif-online-3f79e-default-rtdb.firebaseio.com",
            projectId: "arif-online-3f79e",
            storageBucket: "arif-online-3f79e.firebasestorage.app",
            messagingSenderId: "535907035651",
            appId: "1:535907035651:web:630f5780842de82d2e7c36"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let globalPhone = "9504291254"; 

        // 1. CONFIG REALTIME LISTENER
        database.ref('config').on('value', (snapshot) => {
            const config = snapshot.val() || {};
            if(config.phone) globalPhone = config.phone;

            const titleEl = document.getElementById('site-title');
            const addressEl = document.getElementById('site-address');
            const sloganEl = document.getElementById('site-slogan');
            const whatsappBtn = document.getElementById('floating-whatsapp');
            const leftLogoImg = document.getElementById('logo-left');
            const rightLogoImg = document.getElementById('logo-right');

            // Render Premium Brand Header (Always Centered Layout logic matches Tailwind v4)
            titleEl.innerHTML = `
                <i class="fa-solid fa-shapes text-amber-500 text-xs sm:text-lg md:text-2xl"></i>
                <span class="text-slate-900">${config.shopName ? config.shopName.split(' ')[0] : 'Arif'}</span> 
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-500 via-amber-600 to-orange-600 font-black tracking-wide">${config.shopName ? config.shopName.split(' ').slice(1).join(' ') : 'Online Center'}</span>
            `;
            
            addressEl.innerHTML = `<i class="fa-solid fa-location-dot text-amber-500 text-[9px] sm:text-[11px]"></i> ${config.address || 'MOMIN TOLA SAHEBGANJ MASJID ROAD, BHAGALPUR'}`;
            sloganEl.innerText = config.slogan || "⚡ ARIF ONLINE CENTER - SERVICE AUTOMATION PORTAL ⚡";

            // State Visibility Controls
            document.querySelector('header').style.display = (config.showName !== false || config.showAddress !== false) ? 'block' : 'none';
            addressEl.style.display = (config.showAddress !== false) ? 'flex' : 'none';
            sloganEl.style.display = (config.showSlogan !== false) ? 'block' : 'none';

            // Left Logo Dynamic Control
            if(config.showLogoLeft !== false && config.logoLeft) {
                leftLogoImg.src = config.logoLeft;
                leftLogoImg.classList.remove('hidden');
            } else {
                leftLogoImg.classList.add('hidden');
            }

            // Right Logo Dynamic Control
            if(config.showLogoRight !== false && config.logoRight) {
                rightLogoImg.src = config.logoRight;
                rightLogoImg.classList.remove('hidden');
            } else {
                rightLogoImg.classList.add('hidden');
            }

            // Floating WhatsApp Node Setup
            if (config.showPhone !== false && config.phone) {
                whatsappBtn.href = `https://api.whatsapp.com/send?phone=91${config.phone}&text=Hello! I am visiting your web portal and need assistance.`;
                whatsappBtn.classList.replace('hidden', 'flex');
            } else {
                whatsappBtn.classList.replace('flex', 'hidden');
            }
        });

        // 2. LIVE DYNAMIC NOTICES CONTAINER RENDERING
        database.ref('notices').on('value', (snapshot) => {
            const container = document.getElementById('public-notices-container');
            container.innerHTML = ""; 

            const data = snapshot.val();
            
            if (!data) {
                container.innerHTML = `
                    <div class="bg-white border border-slate-200 p-8 md:p-12 rounded-2xl text-center text-slate-400 max-w-md mx-auto shadow-xs">
                        <div class="text-slate-300 text-4xl md:text-5xl mb-3"><i class="fa-regular fa-folder-open"></i></div>
                        <p class="font-medium text-xs md:text-sm tracking-wide">No active notices are listed at this moment.</p>
                    </div>`;
                return;
            }

            const noticesList = [];
            Object.keys(data).forEach(key => {
                noticesList.push(data[key]);
            });
            noticesList.reverse();

            noticesList.forEach((item) => {
                const noticeCard = document.createElement('article');
                noticeCard.className = "bg-white rounded-2xl border border-slate-200 overflow-hidden card-shadow-smooth transition-all duration-300 flex flex-col md:flex-row group";

                let imgHTML = "";
                let contentWidthClass = "w-full";

                if (item.image) {
                    contentWidthClass = "w-full md:w-3/5"; 
                    imgHTML = `
                        <div class="w-full md:w-2/5 bg-slate-50/60 border-b md:border-b-0 md:border-r border-slate-200/60 flex justify-center items-center p-4 min-h-[200px] sm:min-h-[240px]">
                            <img src="${item.image}" alt="Notice Asset" class="w-full h-full max-h-[260px] md:max-h-[280px] object-contain rounded-xl group-hover:scale-[1.01] transition duration-300" loading="lazy">
                        </div>`;
                }

                const whatsappText = encodeURIComponent(`Hello Arif Bhai, mujhe iske baare me janna hai:\n📌 *${item.title}*`);
                const whatsappUrl = `https://api.whatsapp.com/send?phone=91${globalPhone}&text=${whatsappText}`;
                const shareTitle = item.title;

                noticeCard.innerHTML = `
                    ${imgHTML}
                    <div class="${contentWidthClass} p-5 md:p-6 flex flex-col justify-between space-y-4">
                        <div class="space-y-2.5 md:space-y-3">
                            <h2 class="text-lg md:text-2xl font-extrabold text-slate-900 tracking-tight leading-snug group-hover:text-amber-600 transition duration-150">${item.title}</h2>
                            <p class="text-[9px] md:text-[10px] font-mono font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1.5">
                                <i class="fa-regular fa-calendar-days text-slate-400"></i> ${item.date}
                            </p>
                            <div class="h-px bg-slate-100 w-full"></div>
                            <p class="text-xs md:text-sm text-slate-500 whitespace-pre-wrap font-normal leading-relaxed font-sans">${item.desc}</p>
                        </div>
                        
                        <div class="flex flex-row gap-3 pt-2 w-full">
                            <a href="${whatsappUrl}" target="_blank" class="flex-1 flex items-center justify-center gap-1.5 md:gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs md:text-sm font-bold py-3 px-3 md:px-4 rounded-xl shadow-xs hover:shadow-md transition duration-200 text-center">
                                <i class="fa-brands fa-whatsapp text-sm md:text-base"></i> Process Order
                            </a>
                            <button onclick="sharePost('${escape(shareTitle)}')" class="flex-1 flex items-center justify-center gap-1.5 md:gap-2 bg-slate-50 hover:bg-slate-100 text-slate-600 hover:text-slate-800 text-xs md:text-sm font-bold py-3 px-3 md:px-4 rounded-xl border border-slate-200 transition duration-150 cursor-pointer text-center">
                                <i class="fa-solid fa-share-nodes text-blue-500"></i> Share Post
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(noticeCard);
            });
        });

        // NATIVE CLIPBOARD / SYSTEM SHARE INTERFACE
        function sharePost(escapedTitle) {
            const title = unescape(escapedTitle);
            const currentUrl = window.location.href;
            const fullShareText = `📢 *${title}*\n\nNeeche diye gaye link par click karke poori jankari dekhein:\n🔗 ${currentUrl}`;

            if (navigator.share) {
                navigator.share({
                    title: title,
                    text: fullShareText,
                    url: currentUrl
                }).catch(err => console.log(err));
            } else {
                navigator.clipboard.writeText(fullShareText)
                .then(() => alert("🚀 Link copied successfully! Ready to paste and share."))
                .catch(() => alert("Clipboard block detected."));
            }
        }
    </script>
</body>
</html>
