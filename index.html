<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Digital Portal - Notices</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        .premium-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1.1px, transparent 1.1px), radial-gradient(#e2e8f0 1.1px, #f8fafc 1.1px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
        }
        .card-shadow-smooth {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 4px 12px -2px rgba(0, 0, 0, 0.03);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="premium-bg text-slate-800 font-sans min-h-screen flex flex-col selection:bg-amber-500 antialiased">

    <header class="sticky top-0 z-50 backdrop-blur-md bg-white/90 border-b border-slate-200 shadow-xs w-full">
        <div class="w-full py-4 px-3 md:px-6">
            <div class="flex flex-row items-center justify-between gap-2 md:gap-6 max-w-7xl mx-auto w-full">
                <div class="flex items-center justify-start shrink-0">
                    <img id="logo-left" src="" alt="Logo Left" class="hidden h-11 w-11 md:h-16 md:w-16 object-contain rounded-2xl bg-slate-50 border border-slate-200 p-1 shadow-xs">
                </div>
                <div class="flex flex-col items-center text-center flex-grow px-1">
                    <h1 id="site-title" class="text-sm sm:text-2xl font-black uppercase tracking-wider flex items-center justify-center gap-2">
                        <i class="fa-solid fa-shapes text-amber-500"></i> Arif Online Center
                    </h1>
                    <p id="site-address" class="text-[10px] font-semibold text-slate-500 mt-1"></p>
                </div>
                <div class="flex items-center justify-end shrink-0">
                    <img id="logo-right" src="" alt="Logo Right" class="hidden h-11 w-11 md:h-16 md:w-16 object-contain rounded-2xl bg-slate-50 border border-slate-200 p-1 shadow-xs">
                </div>
            </div>
        </div>
    </header>

    <div class="w-full bg-white border-b border-slate-200 sticky top-[69px] md:top-[85px] z-30 shadow-xs p-3">
        <div class="max-w-4xl mx-auto relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
            <input type="text" id="search-input" onkeyup="filterNotices()" placeholder="Search notices by title..." class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 transition">
        </div>
    </div>

    <main class="max-w-4xl w-full mx-auto px-4 py-6 flex-grow">
        <div id="public-notices-container" class="space-y-4 md:space-y-6">
            </div>
    </main>

    <div id="details-modal" class="fixed inset-0 z-50 hidden bg-slate-950/60 backdrop-blur-md items-center justify-center p-4">
        </div>

    <script>
        // Firebase init and Config remains exactly as your original code
        const firebaseConfig = { /* ... your config ... */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let allNotices = []; // Array to store data for filtering

        // FILTER FUNCTION
        function filterNotices() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('public-notices-container');
            container.innerHTML = "";
            
            const filtered = allNotices.filter(item => item.title.toLowerCase().includes(query));
            
            filtered.forEach(item => {
                // Same card rendering logic as your original "notices" section
                renderNoticeCard(item, container);
            });
        }

        // Fetch data and save to allNotices
        database.ref('notices').on('value', (snapshot) => {
            const data = snapshot.val();
            allNotices = data ? Object.values(data).reverse() : [];
            filterNotices(); // Display all initially
        });

        function renderNoticeCard(item, container) {
            // Re-using your exact logic to generate cards
            const noticeCard = document.createElement('article');
            noticeCard.className = "bg-white rounded-2xl border border-slate-200 overflow-hidden card-shadow-smooth flex flex-col md:flex-row group";
            // ... (Add your original card generation logic here)
            container.appendChild(noticeCard);
        }

        // Include original modal/share functions here...
    </script>
</body>
</html>
