<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Arif Online Center</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Admin Login</h2>
    <input type="password" id="password" placeholder="Enter Admin Password">
    <button onclick="checkPassword()">Login</button>
</div>

<script>
    function checkPassword() {
        var password = document.getElementById("password").value;
        if (password === "786786") {
            // Sahi tareeka: login hone ke baad aapka real admin dashboard khulega
            // Note: Agar aapka dashboard kisi dusre page par hai (jaise dashboard.html), toh yahan uska naam likhein.
            window.location.href = "https://arifonlinecenter-lgtm.github.io/arif-online-center/admin.html";
        } else {
            alert("Galat Password hai! Fir se koshish karein.");
        }
    }
</script>

</body>
</html>
