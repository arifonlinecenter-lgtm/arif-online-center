<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-slate-100 p-4">

    <div class="flex gap-2 mb-6">
        <button onclick="switchTab('tab-notices')" class="bg-blue-600 text-white p-3 rounded-xl font-bold">Notices</button>
        <button onclick="switchTab('tab-services')" class="bg-amber-600 text-white p-3 rounded-xl font-bold">Services</button>
    </div>

    <div id="tab-notices" class="tab-panel">
        <h1 class="text-xl font-bold">Manage Notices</h1>
        </div>

    <div id="tab-services" class="tab-panel hidden space-y-6">
        <div class="bg-white p-6 rounded-2xl border shadow-sm">
            <h2 class="font-bold text-lg mb-4">Add New Service</h2>
            <form id="service-form" class="space-y-4">
                <input type="text" id="s-title" placeholder="Service Title" class="w-full p-2 border rounded-xl" required>
                <input type="file" id="s-img" class="w-full p-2 border rounded-xl" required>
                <textarea id="s-desc" placeholder="Service Details" class="w-full p-2 border rounded-xl" required></textarea>
                <button type="submit" class="w-full bg-amber-600 text-white p-3 rounded-xl font-bold">Post Service</button>
            </form>
        </div>
    </div>

    <script>
        // Tab switch karne ka function
        function switchTab(tabId) {
            document.querySelectorAll('.tab-panel').forEach(t => t.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
        }

        // Service save karne ka logic
        document.getElementById('service-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('s-title').value;
            const desc = document.getElementById('s-desc').value;
            const fileInput = document.getElementById('s-img');
            const file = fileInput.files[0];
            
            const reader = new FileReader();
            reader.onload = function(e) {
                // 'services' naam ka naya folder database mein ban jayega
                database.ref('services/').push({
                    title: title,
                    desc: desc,
                    image: e.target.result,
                    date: new Date().toLocaleDateString()
                });
                alert("Service Post Ho Gayi!");
                document.getElementById('service-form').reset();
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
