<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Panel - Arif Online Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        .admin-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="admin-bg text-slate-800 font-sans min-h-screen py-6 md:py-12 px-4 selection:bg-amber-500 selection:text-slate-950">

    <div class="max-w-3xl mx-auto bg-white/90 backdrop-blur-md border border-slate-200 rounded-3xl shadow-xl p-6 md:p-10">
        
        <div class="flex flex-col md:flex-row items-center justify-between border-b border-slate-200 pb-6 mb-6 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-2xl md:text-3xl font-black tracking-wider uppercase text-slate-900">
                    <span class="text-amber-600"><i class="fa-solid fa-sliders-h mr-2"></i>Control</span> Portal
                </h1>
                <p class="text-xs text-slate-500 font-medium tracking-wide mt-1">Live configuration setup for ARIF ONLINE CENTER</p>
            </div>
            <div class="shrink-0">
                <span id="sync-status" class="bg-emerald-50 text-emerald-700 border border-emerald-200 text-[10px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-full flex items-center gap-1.5 animate-pulse">
                    <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span> Server Connected
                </span>
            </div>
        </div>

        <div class="flex flex-row gap-2 border-b border-slate-200 pb-4 mb-6 overflow-x-auto no-scrollbar">
            <button type="button" onclick="switchTab('tab-identity')" id="btn-tab-identity" class="px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider transition-all duration-200 cursor-pointer shrink-0 bg-amber-500 text-slate-950 shadow-md shadow-amber-500/20">
                <i class="fa-solid fa-shop mr-1"></i> Identity & Header
            </button>
            <button type="button" onclick="switchTab('tab-logos')" id="btn-tab-logos" class="px-4 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider transition-all duration-200 cursor-pointer shrink-0 bg-slate-100 text-slate-600 hover:bg-slate-200/80 hover:text-slate-900">
                <i class="fa-solid fa-image mr-1"></i> Logo Setup
            </button>
            <button type="button" onclick="switchTab('tab-socials')" id="btn-tab-socials" class="px-4 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider transition-all duration-200 cursor-pointer shrink-0 bg-slate-100 text-slate-600 hover:bg-slate-200/80 hover:text-slate-900">
                <i class="fa-solid fa-share-nodes mr-1"></i> Social Channels
            </button>
        </div>

        <form id="config-form" class="space-y-6">
            
            <div id="tab-identity" class="tab-content bg-slate-50 border border-slate-200 p-5 md:p-6 rounded-2xl space-y-4">
                <h2 class="text-sm font-black uppercase tracking-widest text-amber-600 flex items-center gap-2 border-b border-slate-200 pb-2">
                    <i class="fa-solid fa-shop"></i> 1. Shop Identity & Header Config
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Shop Name</label>
                        <input type="text" id="shopName" class="w-full bg-white border border-slate-300 rounded-xl px-4 py-2.5 text-sm text-slate-900 focus:outline-none focus:border-amber-500 transition shadow-xs" placeholder="e.g., Arif Online Center">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">WhatsApp / Phone Number</label>
                        <input type="text" id="phone" class="w-full bg-white border border-slate-300 rounded-xl px-4 py-2.5 text-sm text-slate-900 focus:outline-none focus:border-amber-500 transition shadow-xs" placeholder="10 digit number">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Shop Address</label>
                        <input type="text" id="address" class="w-full bg-white border border-slate-300 rounded-xl px-4 py-2.5 text-sm text-slate-900 focus:outline-none focus:border-amber-500 transition shadow-xs" placeholder="Full shop address">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 pt-2">
                    <label class="flex items-center gap-3 bg-white border border-slate-200 p-3 rounded-xl cursor-pointer select-none hover:border-slate-300 shadow-xs">
                        <input type="checkbox" id="showName" class="accent-amber-500 h-4 w-4">
                        <span class="text-xs font-bold uppercase text-slate-700">Show Shop Name</span>
                    </label>
                    <label class="flex items-center gap-3 bg-white border border-slate-200 p-3 rounded-xl cursor-pointer select-none hover:border-slate-300 shadow-xs">
                        <input type="checkbox" id="showAddress" class="accent-amber-500 h-4 w-4">
                        <span class="text-xs font-bold uppercase text-slate-700">Show Address</span>
                    </label>
                    <label class="flex items-center gap-3 bg-white border border-slate-200 p-3 rounded-xl cursor-pointer select-none hover:border-slate-300 shadow-xs">
                        <input type="checkbox" id="showPhone" class="accent-amber-500 h-4 w-4">
                        <span class="text-xs font-bold uppercase text-slate-700">Show Contact Button</span>
                    </label>
                </div>
            </div>

            <div id="tab-logos" class="tab-content hidden bg-slate-50 border border-slate-200 p-5 md:p-6 rounded-2xl space-y-4">
                <h2 class="text-sm font-black uppercase tracking-widest text-amber-600 flex items-center gap-2 border-b border-slate-200 pb-2">
                    <i class="fa-solid fa-image"></i> 2. Logo Configuration (Image Links)
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Left Logo URL</label>
                        <input type="url" id="logoLeft" class="w-full bg-white border border-slate-300 rounded-xl px-4 py-2.5 text-sm text-slate-900 focus:outline-none focus:border-amber-500 transition shadow-xs" placeholder="https://example.com/logo-left.png">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Right Logo URL</label>
                        <input type="url" id="logoRight" class="w-full bg-white border border-slate-300 rounded-xl px-4 py-2.5 text-sm text-slate-900 focus:outline-none focus:border-amber-500 transition shadow-xs" placeholder="https://example.com/logo-right.png">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-2">
                    <label class="flex items-center gap-3 bg-white border border-slate-200 p-3 rounded-xl cursor-pointer select-none hover:border-slate-300 shadow-xs">
                        <input type="checkbox" id="showLogoLeft" class="accent-amber-500 h-4 w-4">
                        <span class="text-xs font-bold uppercase text-slate-700">Enable Left Logo</span>
                    </label>
                    <label class="flex items-center gap-3 bg-white border border-slate-200 p-3 rounded-xl cursor-pointer select-none hover:border-slate-300 shadow-xs">
                        <input type="checkbox" id="showLogoRight" class="accent-amber-500 h-4 w-4">
                        <span class="text-xs font-bold uppercase text-slate-700">Enable Right Logo</span>
                    </label>
                </div>
            </div>

            <div id="tab-socials" class="tab-content hidden bg-slate-50 border border-slate-200 p-5 md:p-6 rounded-2xl space-y-4">
                <h2 class="text-sm font-black uppercase tracking-widest text-amber-600 flex items-center gap-2 border-b border-slate-200 pb-2">
                    <i class="fa-solid fa-share-nodes"></i> 3. Slogan & Social Channels Bar
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Top Bar Alert Slogan</label>
                        <input type="text" id="slogan" class="w-full bg-white border border-slate-300 rounded-xl px-4 py-2.5 text-sm text-slate-900 focus:outline-none focus:border-amber-500 transition shadow-xs" placeholder="⚡ WELCOME TO OUR PORTAL ⚡">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5"><i class="fa-brands fa-youtube text-red-500"></i> YouTube Channel Link</label>
                            <input type="url" id="youtubeLink" class="w-full bg-white border border-slate-300 rounded-xl px-4 py-2.5 text-sm text-slate-900 focus:outline-none focus:border-amber-500 transition shadow-xs" placeholder="https://youtube.com/c/yourchannel">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5"><i class="fa-brands fa-whatsapp text-emerald-600"></i> WhatsApp Group Link</label>
                            <input type="url" id="whatsappGroupLink" class="w-full bg-white border border-slate-300 rounded-xl px-4 py-2.5 text-sm text-slate-900 focus:outline-none focus:border-amber-500 transition shadow-xs" placeholder="https://chat.whatsapp.com/invitecode">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 pt-2">
                    <label class="flex items-center gap-3 bg-white border border-slate-200 p-3 rounded-xl cursor-pointer select-none hover:border-slate-300 shadow-xs">
                        <input type="checkbox" id="showSlogan" class="accent-amber-500 h-4 w-4">
                        <span class="text-xs font-bold uppercase text-slate-700">Show Slogan Text</span>
                    </label>
                    <label class="flex items-center gap-3 bg-white border border-slate-200 p-3 rounded-xl cursor-pointer select-none hover:border-slate-300 shadow-xs">
                        <input type="checkbox" id="showYoutube" class="accent-amber-500 h-4 w-4">
                        <span class="text-xs font-bold uppercase text-slate-700">Show YouTube Link</span>
                    </label>
                    <label class="flex items-center gap-3 bg-white border border-slate-200 p-3 rounded-xl cursor-pointer select-none hover:border-slate-300 shadow-xs">
                        <input type="checkbox" id="showWaGroup" class="accent-amber-500 h-4 w-4">
                        <span class="text-xs font-bold uppercase text-slate-700">Show WhatsApp Group</span>
                    </label>
                </div>
            </div>

            <div class="pt-2">
                <button type="button" onclick="saveConfiguration()" class="w-full bg-gradient-to-r from-amber-500 via-amber-600 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-slate-950 text-sm font-black uppercase tracking-widest py-4 px-6 rounded-2xl shadow-md transition duration-200 transform active:scale-[0.99] cursor-pointer flex items-center justify-center gap-2">
                    <i class="fa-solid fa-cloud-arrow-up text-lg"></i> Update Live Changes
                </button>
            </div>

        </form>
    </div>

    <script>
        // Smooth Tab Switching Engine
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(tabId).classList.remove('hidden');

            const btnIdentity = document.getElementById('btn-tab-identity');
            const btnLogos = document.getElementById('btn-tab-logos');
            const btnSocials = document.getElementById('btn-tab-socials');

            [btnIdentity, btnLogos, btnSocials].forEach(btn => {
                btn.className = "px-4 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider transition-all duration-200 cursor-pointer shrink-0 bg-slate-100 text-slate-600 hover:bg-slate-200/80 hover:text-slate-900";
            });

            const targetBtn = document.getElementById('btn-' + tabId);
            targetBtn.className = "px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider transition-all duration-200 cursor-pointer shrink-0 bg-amber-500 text-slate-950 shadow-md shadow-amber-500/20";
        }

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB0w82POMs3HZ6Ay-3Z4g0nhLPGHNQCNlY",
            authDomain: "arif-online-3f79e.firebaseapp.com",
            databaseURL: "https://arif-online-3f79e-default-rtdb.firebaseio.com",
            projectId: "arif-online-3f79e",
            storageBucket: "arif-online-3f79e.firebasestorage.app",
            messagingSenderId: "535907035651",
            appId: "1:535907035651:web:630f5780842de82d2e7c36"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Load Live Settings
        database.ref('config').once('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            document.getElementById('shopName').value = data.shopName || "Arif Online Center";
            document.getElementById('phone').value = data.phone || "9504291254";
            document.getElementById('address').value = data.address || "MOMIN TOLA SAHEBGANJ MASJID ROAD, BHAGALPUR";
            document.getElementById('logoLeft').value = data.logoLeft || "";
            document.getElementById('logoRight').value = data.logoRight || "";
            document.getElementById('slogan').value = data.slogan || "⚡ ARIF ONLINE CENTER - SERVICE AUTOMATION PORTAL ⚡";
            document.getElementById('youtubeLink').value = data.youtubeLink || "";
            document.getElementById('whatsappGroupLink').value = data.whatsappGroupLink || "";

            document.getElementById('showName').checked = data.showName !== false;
            document.getElementById('showAddress').checked = data.showAddress !== false;
            document.getElementById('showPhone').checked = data.showPhone !== false;
            document.getElementById('showLogoLeft').checked = data.showLogoLeft !== false;
            document.getElementById('showLogoRight').checked = data.showLogoRight !== false;
            document.getElementById('showSlogan').checked = data.showSlogan !== false;
            document.getElementById('showYoutube').checked = data.showYoutube !== false;
            document.getElementById('showWaGroup').checked = data.showWaGroup !== false;
            
            const statusNode = document.getElementById('sync-status');
            statusNode.innerHTML = `<span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span> Live Synced`;
            statusNode.className = "bg-emerald-50 text-emerald-700 border border-emerald-200 text-[10px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-full flex items-center gap-1.5";
        });

        // Save Function
        function saveConfiguration() {
            const payload = {
                shopName: document.getElementById('shopName').value,
