<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel - Admin Only</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Libraries v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen pb-12">

    <!-- TOP HEADER -->
    <header class="bg-slate-900 text-white shadow-md py-4 px-6 mb-8 border-b-2 border-amber-500">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-wider uppercase flex items-center gap-2">
                <i class="fa-solid fa-gauge text-amber-500"></i> Arif Online - Live Control
            </h1>
            <span class="text-xs bg-green-500/20 text-green-400 font-bold px-3 py-1 rounded-full flex items-center gap-1.5">
                <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span> Firebase Connected
            </span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- ⚙️ LEFT SIDE: WEBSITE CONTROLS & LOGO OPTIONS -->
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs">
                <h2 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-2">
                    <i class="fa-solid fa-sliders text-blue-600"></i> Header & Logo Settings
                </h2>
                
                <form id="config-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Shop / Website Name</label>
                        <input type="text" id="cfg-name" class="w-full text-sm p-2.5 border rounded-xl focus:outline-blue-600">
                        <label class="inline-flex items-center mt-1 cursor-pointer"><input type="checkbox" id="chk-name" class="rounded text-blue-600" checked> <span class="text-xs text-slate-500 ml-1">Show on site</span></label>
                    </div>

                    <!-- 🔴 LEFT LOGO INPUT -->
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Left Logo Image URL</label>
                        <input type="url" id="cfg-logo-left" placeholder="https://example.com/logo1.png" class="w-full text-sm p-2.5 border rounded-xl focus:outline-blue-600">
                        <label class="inline-flex items-center mt-1 cursor-pointer"><input type="checkbox" id="chk-logo-left" class="rounded text-blue-600" checked> <span class="text-xs text-slate-500 ml-1">Show Left Logo</span></label>
                    </div>

                    <!-- 🔴 RIGHT LOGO INPUT -->
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Right Logo Image URL</label>
                        <input type="url" id="cfg-logo-right" placeholder="https://example.com/logo2.png" class="w-full text-sm p-2.5 border rounded-xl focus:outline-blue-600">
                        <label class="inline-flex items-center mt-1 cursor-pointer"><input type="checkbox" id="chk-logo-right" class="rounded text-blue-600" checked> <span class="text-xs text-slate-500 ml-1">Show Right Logo</span></label>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Address Text</label>
                        <input type="text" id="cfg-address" class="w-full text-sm p-2.5 border rounded-xl focus:outline-blue-600">
                        <label class="inline-flex items-center mt-1 cursor-pointer"><input type="checkbox" id="chk-address" class="rounded text-blue-600" checked> <span class="text-xs text-slate-500 ml-1">Show Address</span></label>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">WhatsApp Phone Number</label>
                        <input type="text" id="cfg-phone" class="w-full text-sm p-2.5 border rounded-xl focus:outline-blue-600">
                        <label class="inline-flex items-center mt-1 cursor-pointer"><input type="checkbox" id="chk-phone" class="rounded text-blue-600" checked> <span class="text-xs text-slate-500 ml-1">Enable Chat Button</span></label>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Slogan / Footer Text</label>
                        <input type="text" id="cfg-slogan" class="w-full text-sm p-2.5 border rounded-xl focus:outline-blue-600">
                        <label class="inline-flex items-center mt-1 cursor-pointer"><input type="checkbox" id="chk-slogan" class="rounded text-blue-600" checked> <span class="text-xs text-slate-500 ml-1">Show Slogan</span></label>
                    </div>
                    <button type="button" onclick="saveConfig()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold p-3 rounded-xl shadow-xs cursor-pointer transition">
                        <i class="fa-solid fa-floppy-disk"></i> Save Header Settings
                    </button>
                </form>
            </div>
        </div>

        <!-- 📝 RIGHT SIDE: ADD NEW POSTS & LIST -->
        <div class="lg:col-span-2 space-y-6">
            <!-- Form to Create Post -->
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs">
                <h2 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-2">
                    <i class="fa-solid fa-bullhorn text-emerald-600"></i> Create New Post / Notice
                </h2>
                <form id="notice-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Notice / Post Title</label>
                        <input type="text" id="post-title" required placeholder="e.g., Bihar Board 11th Admission 2026 Started" class="w-full text-sm p-2.5 border rounded-xl focus:outline-blue-600">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Poster Image Link (Optional)</label>
                        <input type="url" id="post-image" placeholder="https://example.com/poster.jpg" class="w-full text-sm p-2.5 border rounded-xl focus:outline-blue-600">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Full Description / Scheme Details</label>
                        <textarea id="post-desc" rows="4" required placeholder="Write details, criteria, required documents here..." class="w-full text-sm p-2.5 border rounded-xl focus:outline-blue-600"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold p-3 rounded-xl shadow-xs cursor-pointer transition">
                        <i class="fa-solid fa-paper-plane"></i> Publish Live Notice
                    </button>
                </form>
            </div>

            <!-- Published Posts Manager -->
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs">
                <h2 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-2">
                    <i class="fa-solid fa-list-check text-indigo-600"></i> Manage Published Notices
                </h2>
                <div id="admin-notices-list" class="space-y-3">
                    <p class="text-xs text-slate-400 text-center py-6">Loading active notices...</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB0w82POMs3HZ6Ay-3Z4g0nhLPGHNQCNlY",
            authDomain: "arif-online-3f79e.firebaseapp.com",
            databaseURL: "https://arif-online-3f79e-default-rtdb.firebaseio.com",
            projectId: "arif-online-3f79e",
            storageBucket: "arif-online-3f79e.firebasestorage.app",
            messagingSenderId: "535907035651",
            appId: "1:535907035651:web:630f5780842de82d2e7c36"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Load Configuration Form Details
        database.ref('config').once('value', (snapshot) => {
            const config = snapshot.val() || {};
            document.getElementById('cfg-name').value = config.shopName || "ARIF ONLINE CENTER";
            document.getElementById('cfg-logo-left').value = config.logoLeft || "";
            document.getElementById('cfg-logo-right').value = config.logoRight || "";
            document.getElementById('cfg-address').value = config.address || "MOMIN TOLA SAHEBGANJ MASJID ROAD, BHAGALPUR";
            document.getElementById('cfg-phone').value = config.phone || "9504291254";
            document.getElementById('cfg-slogan').value = config.slogan || "⚡ ARIF ONLINE CENTER - AAPKI SEVA ME SADA TATPAR ⚡";

            document.getElementById('chk-name').checked = config.showName !== false;
            document.getElementById('chk-logo-left').checked = config.showLogoLeft !== false;
            document.getElementById('chk-logo-right').checked = config.showLogoRight !== false;
            document.getElementById('chk-address').checked = config.showAddress !== false;
            document.getElementById('chk-phone').checked = config.showPhone !== false;
            document.getElementById('chk-slogan').checked = config.showSlogan !== false;
        });

        // Save Header Config
        function saveConfig() {
            const data = {
                shopName: document.getElementById('cfg-name').value,
                logoLeft: document.getElementById('cfg-logo-left').value,
                logoRight: document.getElementById('cfg-logo-right').value,
                address: document.getElementById('cfg-address').value,
                phone: document.getElementById('cfg-phone').value,
                slogan: document.getElementById('cfg-slogan').value,
                showName: document.getElementById('chk-name').checked,
                showLogoLeft: document.getElementById('chk-logo-left').checked,
                showLogoRight: document.getElementById('chk-logo-right').checked,
                showAddress: document.getElementById('chk-address').checked,
                showPhone: document.getElementById('chk-phone').checked,
                showSlogan: document.getElementById('chk-slogan').checked
            };

            database.ref('config').set(data)
                .then(() => alert("✅ Website Settings Updated Successfully!"))
                .catch(err => alert("Error: " + err.message));
        }

        // Create Notice Submission
        document.getElementById('notice-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('post-title').value;
            const image = document.getElementById('post-image').value;
            const desc = document.getElementById('post-desc').value;
            const dateStr = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });

            const newNoticeRef = database.ref('notices').push();
            newNoticeRef.set({
                id: newNoticeRef.key,
                title: title,
                image: image,
                desc: desc,
                date: dateStr
            }).then(() => {
                alert("📢 Notice Published Live!");
                document.getElementById('notice-form').reset();
            }).catch(err => alert("Error: " + err.message));
        });

        // Realtime Render List inside Admin Panel
        database.ref('notices').on('value', (snapshot) => {
            const listDiv = document.getElementById('admin-notices-list');
            listDiv.innerHTML = "";
            const data = snapshot.val();

            if(!data) {
                listDiv.innerHTML = `<p class="text-xs text-slate-400 text-center py-4">No active posts available.</p>`;
                return;
            }

            Object.keys(data).reverse().forEach((key) => {
                const item = data[key];
                const card = document.createElement('div');
                card.className = "p-3 border rounded-xl flex items-center justify-between text-xs bg-slate-50 border-slate-200";
                card.innerHTML = `
                    <div class="space-y-0.5 max-w-[80%]">
                        <p class="font-bold text-slate-800 truncate">${item.title}</p>
                        <p class="text-[10px] font-medium text-slate-400">${item.date}</p>
                    </div>
                    <button onclick="deleteNotice('${item.id}')" class="bg-red-50 text-red-600 hover:bg-red-100 p-2 rounded-lg cursor-pointer transition">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;
                listDiv.appendChild(card);
            });
        });

        function deleteNotice(id) {
            if(confirm("Are you sure you want to delete this notice permanently from public view?")) {
                database.ref('notices/' + id).remove()
                    .then(() => alert("🗑️ Notice Deleted!"))
                    .catch(err => alert("Error: " + err.message));
            }
        }
    </script>
</body>
</html>
